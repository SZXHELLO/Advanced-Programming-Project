<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目 | SDOC Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .project-page {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--space-md);
            overflow: hidden;
        }

        .page-header {
            margin-bottom: var(--space-md);
            flex-shrink: 0;
        }

        .page-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--color-ink);
            margin-top: -2px;
        }

        .page-desc {
            color: var(--color-text-light);
            font-size: 13px;
        }

        .project-card {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            display: flex;
            flex: 1;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .project-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            border-bottom: 1px solid var(--color-border-light);
        }

        .project-card-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
            margin-top: -12px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .project-list {
            padding: var(--space-sm);
            overflow: auto;
            display: flex;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            flex: 1;
            flex-direction: column;
            gap: var(--space-xs);
            min-height: 0;
        }

        .project-item {
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
            background: #fff;
            padding: var(--space-sm) var(--space-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 58px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .project-item:hover {
            border-color: var(--color-primary-light);
            box-shadow: var(--shadow-sm);
        }

        .project-main {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .project-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 520px;
        }

        .project-meta {
            font-size: 12px;
            color: var(--color-text-light);
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
        }

        .project-check {
            display: none;
        }

        .project-item.select-mode .project-check {
            display: block;
        }

        .empty-tip {
            text-align: center;
            padding: 24px;
            color: var(--color-text-light);
            font-size: 13px;
        }

        .empty-tip:only-child {
            margin: auto;
        }

        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-sm);
            flex-shrink: 0;
        }

        .nav-buttons .btn {
            flex: 1;
            padding: var(--space-sm);
        }
    </style>
</head>

<body>
    <header class="top-nav">
        <a href="index.html" class="nav-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <span>古籍编辑器</span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                </svg>
                首页
            </a>
            <a href="edit.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                编辑
            </a>
            <a href="project.html" class="nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                    <line x1="7" y1="8" x2="17" y2="8"></line>
                    <line x1="7" y1="12" x2="17" y2="12"></line>
                    <line x1="7" y1="16" x2="13" y2="16"></line>
                </svg>
                项目
            </a>
            <a href="createChar.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
                    <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
                </svg>
                造字
            </a>
            <a href="exportXml.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                导出
            </a>
            <a href="upload.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                上传
            </a>
        </div>
        <div class="nav-spacer"></div>
    </header>

    <main class="page-container">
        <div class="project-page">
            <div class="page-header">
                <h1 class="page-title">项目管理</h1>
                <p class="page-desc">从后端 MySQL 查看、导入、下载与删除已保存项目</p>
            </div>

            <section class="project-card">
                <div class="project-card-header">
                    <div class="project-card-title">已保存项目</div>
                    <div class="header-actions">
                        <button id="importBtn" class="btn btn-primary" style="display:none;" disabled>导入</button>
                        <button id="downloadBtn" class="btn btn-outline" style="display:none;" disabled>下载</button>
                        <button id="deleteBtn" class="btn btn-outline" style="display:none;" disabled>删除</button>
                        <button id="toggleSelectBtn" class="btn btn-outline">选择</button>
                    </div>
                </div>
                <div id="projectList" class="project-list"></div>
            </section>

            <!-- 导航按钮 -->
            <div class="nav-buttons">
                <a href="index.html" class="btn btn-outline">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    </svg>
                    返回首页
                </a>
                <a href="edit.html" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    跳转到编辑页
                </a>
            </div>
        </div>
    </main>

    <footer class="statusbar">
        <div class="status-item"><span class="status-dot"></span><span id="statusText">项目页面</span></div>
        <div class="status-item"><span>项目数: </span><span id="statusCount">0</span></div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script>
        const API_BASE = window.SDOC_API_BASE || "http://localhost:8000";
        const projectListEl = document.getElementById("projectList");
        const toggleSelectBtn = document.getElementById("toggleSelectBtn");
        const importBtn = document.getElementById("importBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        const deleteBtn = document.getElementById("deleteBtn");
        const statusText = document.getElementById("statusText");
        const statusCount = document.getElementById("statusCount");

        let projects = [];
        let selectMode = false;
        const selectedIds = new Set();

        function setStatus(text) {
            statusText.textContent = text;
        }

        function formatDate(v) {
            if (!v) return "-";
            const d = new Date(v);
            if (Number.isNaN(d.getTime())) return String(v);
            return d.toLocaleString();
        }

        function refreshActionButtons() {
            const selectedCount = selectedIds.size;
            importBtn.disabled = selectedCount !== 1;
            downloadBtn.disabled = selectedCount < 1;
            deleteBtn.disabled = selectedCount < 1;
        }

        function renderList() {
            statusCount.textContent = String(projects.length);
            if (!projects.length) {
                projectListEl.innerHTML = '<div class="empty-tip">暂无已保存项目</div>';
                refreshActionButtons();
                return;
            }

            projectListEl.innerHTML = projects.map((p) => {
                const checked = selectedIds.has(p.project_id) ? "checked" : "";
                const modeClass = selectMode ? "select-mode" : "";
                return `
                <div class="project-item ${modeClass}" data-id="${p.project_id}">
                    <div class="project-main">
                        <div class="project-name">${p.title || p.project_id}</div>
                        <div class="project-meta">
                            <span>作者：${p.author || "-"}</span>
                            <span>保存时间：${formatDate(p.saved_at)}</span>
                        </div>
                    </div>
                    <input class="project-check" type="checkbox" ${checked} ${selectMode ? "" : "style='display:none'"} />
                </div>
                `;
            }).join("");

            if (selectMode) {
                projectListEl.querySelectorAll(".project-item").forEach((item) => {
                    const id = item.dataset.id;
                    const checkbox = item.querySelector(".project-check");
                    checkbox.addEventListener("change", () => {
                        if (checkbox.checked) selectedIds.add(id);
                        else selectedIds.delete(id);
                        refreshActionButtons();
                    });
                });
            }

            refreshActionButtons();
        }

        async function loadProjects() {
            try {
                setStatus("正在加载项目...");
                const resp = await fetch(`${API_BASE}/api/projects`);
                if (!resp.ok) throw new Error("项目列表加载失败");
                const data = await resp.json();
                projects = Array.isArray(data?.projects) ? data.projects : [];
                renderList();
                setStatus("项目加载完成");
            } catch (err) {
                console.error(err);
                projectListEl.innerHTML = '<div class="empty-tip">加载失败，请稍后重试</div>';
                setStatus("加载失败");
            }
        }

        function toggleSelectMode() {
            selectMode = !selectMode;
            selectedIds.clear();
            importBtn.style.display = selectMode ? "inline-flex" : "none";
            downloadBtn.style.display = selectMode ? "inline-flex" : "none";
            deleteBtn.style.display = selectMode ? "inline-flex" : "none";
            toggleSelectBtn.textContent = selectMode ? "取消" : "选择";
            renderList();
        }

        async function importSelectedProject() {
            if (selectedIds.size !== 1) return;
            const projectId = Array.from(selectedIds)[0];
            try {
                const resp = await fetch(`${API_BASE}/api/projects/${encodeURIComponent(projectId)}/latest`);
                if (!resp.ok) throw new Error("项目导入失败");
                const data = await resp.json();

                const collabResp = await fetch(`${API_BASE}/api/collab/status?projectId=${encodeURIComponent(projectId)}`);
                let onlineCount = 0;
                if (collabResp.ok) {
                    const collabData = await collabResp.json();
                    onlineCount = Number(collabData?.onlineCount || 0);
                }
                // 稳定策略：导入项目即开启协同连接，在线人数仅用于初始展示。
                const shouldEnableCollab = true;

                AppState.project = data.project || null;
                AppState.pages = Array.isArray(data.pages) ? data.pages : [];
                AppState.annotations = Array.isArray(data.annotations) ? data.annotations : [];
                AppState.customChars = Array.isArray(data.customChars) ? data.customChars : [];
                AppState.currentPageIndex = 0;
                AppState.save();

                sessionStorage.setItem('sdoc_collab_project_id', projectId);
                sessionStorage.setItem('sdoc_collab_enabled', shouldEnableCollab ? '1' : '0');
                sessionStorage.setItem('sdoc_collab_online_hint', String(onlineCount + 1));

                window.location.href = "edit.html";
            } catch (err) {
                console.error(err);
                alert("导入失败，请重试");
            }
        }

        function downloadSelectedProjects() {
            if (!selectedIds.size) return;
            selectedIds.forEach((id) => {
                const a = document.createElement("a");
                a.href = `${API_BASE}/api/projects/${encodeURIComponent(id)}/download`;
                a.target = "_blank";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }

        async function deleteSelectedProjects() {
            if (!selectedIds.size) return;
            if (!confirm(`确定删除选中的 ${selectedIds.size} 个项目吗？`)) return;

            try {
                const ids = Array.from(selectedIds);
                const resp = await fetch(`${API_BASE}/api/projects`, {
                    method: "DELETE",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ projectIds: ids })
                });
                if (!resp.ok) throw new Error("删除失败");
                projects = projects.filter((p) => !selectedIds.has(p.project_id));
                selectedIds.clear();
                renderList();
                setStatus("删除完成");
            } catch (err) {
                console.error(err);
                alert("删除失败，请稍后再试");
            }
        }

        toggleSelectBtn.addEventListener("click", toggleSelectMode);
        importBtn.addEventListener("click", importSelectedProject);
        downloadBtn.addEventListener("click", downloadSelectedProjects);
        deleteBtn.addEventListener("click", deleteSelectedProjects);
        document.addEventListener("DOMContentLoaded", loadProjects);
    </script>
</body>

</html>
