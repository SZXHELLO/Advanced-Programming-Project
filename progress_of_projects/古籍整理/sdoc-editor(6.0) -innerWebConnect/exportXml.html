    <style>
        .export-page {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--space-md);
            overflow: hidden;
        }

        .page-header {
            margin-bottom: var(--space-md);
            flex-shrink: 0;
        }

        .page-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--color-ink);
            margin-bottom: var(--space-xs);
        }

        .page-desc {
            color: var(--color-text-light);
            font-size: 13px;
        }

        .export-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: var(--space-md);
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .settings-panel {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            overflow-y: auto;
        }

        .settings-card {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
        }

        .section-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-ink);
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .section-title svg {
            width: 18px;
            height: 18px;
            color: var(--color-cinnabar);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-xs);
            background: var(--color-paper);
            border-radius: var(--radius-sm);
            font-size: 12px;
        }

        .checkbox-item input {
            width: 16px;
            height: 16px;
        }

        .checkbox-item label {
            flex: 1;
        }

        .export-summary {
            background: var(--color-paper);
            border-radius: var(--radius-md);
            padding: var(--space-sm);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: var(--space-xs) 0;
            border-bottom: 1px solid var(--color-border);
            font-size: 12px;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-label {
            color: var(--color-text-light);
        }

        .summary-value {
            font-weight: 600;
            color: var(--color-ink);
        }

        .project-info {
            background: var(--color-paper);
            border-radius: var(--radius-md);
            padding: var(--space-sm);
        }

        .project-info-item {
            display: flex;
            padding: var(--space-xs) 0;
            border-bottom: 1px solid var(--color-border);
            font-size: 12px;
        }

        .project-info-item:last-child {
            border-bottom: none;
        }

        .project-info-label {
            width: 50px;
            color: var(--color-text-light);
        }

        .project-info-value {
            flex: 1;
            color: var(--color-ink);
        }

        /* 右侧预览区域 */
        .preview-panel {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-header {
            padding: var(--space-sm) var(--space-md);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .preview-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-ink);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .preview-title svg {
            width: 18px;
            height: 18px;
            color: var(--color-cinnabar);
        }

        .preview-actions {
            display: flex;
            gap: var(--space-xs);
        }

        .preview-actions .btn {
            padding: var(--space-xs) var(--space-sm);
            font-size: 12px;
        }

        .preview-content {
            flex: 1;
            overflow: auto;
            padding: var(--space-md);
            background: #1e1e1e;
        }

        .xml-preview {
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #d4d4d4;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
        }

        /* 空状态提示 */
        .empty-warning {
            background: #FFF3E0;
            border: 1px solid #FFB74D;
            border-radius: var(--radius-md);
            padding: var(--space-sm);
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            flex-shrink: 0;
        }

        .empty-warning svg {
            width: 20px;
            height: 20px;
            color: #F57C00;
            flex-shrink: 0;
        }

        .empty-warning-text {

            color: #E65100;
            font-size: 12px;
        }

            margin-top: var(--space-sm);
            flex-shrink: 0;
        }

            flex: 1;
            padding: var(--space-sm);
        }
    </style>

    <script>
        let currentXML = '';
        const API_BASE = window.SDOC_API_BASE || "http://localhost:8000";

        function init() {
            updateUI();
        }

        function updateUI() {
            const hasData = AppState.pages.length > 0;

            document.getElementById('emptyWarning').style.display = hasData ? 'none' : 'flex';

            const project = AppState.project || {};
            document.getElementById('projectTitle').textContent = project.title || '未命名';
            document.getElementById('projectAuthor').textContent = project.author || '-';
            document.getElementById('projectDynasty').textContent = project.dynasty || '-';

            document.getElementById('summaryPages').textContent = AppState.pages.length;
            document.getElementById('summaryAnnotations').textContent = AppState.annotations.length;

            generateXML();
        }

        function generateXML() {
            if (AppState.pages.length === 0 && !AppState.project) {
                currentXML = '<?xml version="1.0" encoding="UTF-8"?>\n<!-- 暂无数据可导出 -->';
                document.getElementById('xmlPreview').textContent = currentXML;
                document.getElementById('summarySize').textContent = '-';
                return;
            }

            currentXML = XMLGenerator.generate();
            document.getElementById('xmlPreview').textContent = currentXML;

            const size = new Blob([currentXML]).size;
            document.getElementById('summarySize').textContent = formatSize(size);
        }

        function refreshPreview() {
            AppState.load();
            updateUI();
        }

        function copyXML() {
            navigator.clipboard.writeText(currentXML).then(() => {
                alert('XML已复制到剪贴板');
            }).catch(() => {
                alert('复制失败，请手动选择复制');
            });
        }

        async function downloadXML() {
            if (!currentXML || AppState.pages.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            const filename = `${AppState.project?.title || '古籍'}_${new Date().toISOString().split('T')[0]}.xml`;

            // 先把导出的 XML 落库，失败不阻断本地下载
            try {
                const headers = Object.assign(
                    { "Content-Type": "application/json" },
                    window.Auth && window.Auth.getAuthHeaders ? window.Auth.getAuthHeaders() : {}
                );
                await fetch(`${API_BASE}/api/exports`, {
                    method: "POST",
                    headers,
                    body: JSON.stringify({
                        projectId: AppState.project?.id || null,
                        exportType: "xml",
                        xmlContent: currentXML
                    })
                });
            } catch (e) {
                console.warn("save export xml to db failed:", e);
            }

            downloadFile(currentXML, filename, 'application/xml');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

    <style>
        * {
            margin: 0;

        body {

        .inland-security-footer {

            z-index: 10;
            bottom: 0;
            right: 0;
            width: fit-content;
            display: flex;
            justify-content: flex-end;
        }

        .tooltip-container {

        }

        .trigger-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding: 8px;
            background-color: transparent;
            border-radius: 8px;
            cursor: pointer;
        }

        .minimax-link {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 300;
            color: #adadad;
            text-decoration: none;
        }

        .minimax-link:visited {
            color: #adadad;
        }

        .minimax-link:hover {
            color: #666666;
        }

        .tooltip-content {
            position: absolute;
            bottom: 100%;
            right: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 8px;
            padding-bottom: 16px;
            /* 8px 内容间距 + 8px 用于鼠标移动的透明区域 */
            font-size: 12px;
            line-height: 17px;
            background-color: #fafafa;
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            color: #171717;
        }

        /* 创建透明的连接区域，让鼠标可以平滑移动到 tooltip */
        .tooltip-content::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 16px;
        }

        .tooltip-container:hover .tooltip-content {
            display: flex;
        }

        .info-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .beian-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #171717;
        }

        .beian-icon {
            width: 14px;
            height: 14px;
            margin-right: 2px;
        }

        .underline-text {
            color: #171717;
            text-decoration: underline;
        }

        .underline-text:hover {
            color: #000000;
        }

        /* 深色模式支持 */
        @media (prefers-color-scheme: dark) {
            .trigger-content {
                background-color: transparent;
            }

            .minimax-link,
            .minimax-link:visited {
                color: #666666;
            }

            .minimax-link:hover {
                color: #adadad;
            }

            .tooltip-content {
                background-color: #262626;
                color: #ededed;
            }

            .beian-link,
            .underline-text {
                color: #ededed;
            }

            .underline-text:hover {
                color: #ffffff;
            }
        }
