<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加入项目 | SDOC Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/surface-pages.css">
</head>

<body>
  <header class="top-nav">
    <a href="index.html" class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
      </svg>
      <span>古籍编辑器</span>
    </a>
    <div class="nav-links">
      <a href="project.html" class="nav-link">项目</a>
    </div>
    <div class="nav-spacer"></div>
  </header>

  <main class="page-container surface-scroll">
    <div class="surface-page-wrap">
      <div class="surface-inner surface-inner--narrow">
        <div class="surface-page-header">
          <h1 class="surface-page-title">加入项目</h1>
          <p class="surface-page-desc">通过邀请链接加入协作项目</p>
        </div>

        <div id="loading" class="surface-card surface-status-block join-state-loading">正在验证邀请链接…</div>

        <div id="invitation-info" class="surface-card" style="display:none;">
          <div class="surface-section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            项目邀请
          </div>
          <p class="surface-form-group"><span class="surface-muted">项目：</span><strong id="project-name"></strong></p>
          <p class="surface-form-group"><span class="surface-muted">邀请人：</span><span id="inviter-name"></span></p>
          <p class="surface-form-group"><span class="surface-muted">角色：</span><strong id="granted-role"></strong></p>
          <p class="surface-form-group"><span class="surface-muted">剩余次数：</span><span id="remaining-uses"></span></p>
          <button type="button" class="btn btn-primary" style="width:100%;margin-top:var(--space-sm);" id="join-btn">确认加入</button>
        </div>

        <div id="error-info" class="surface-card" style="display:none;">
          <div class="surface-status-block">
            <h3>无法加入</h3>
            <p id="error-message" class="surface-muted" style="margin-top:var(--space-sm);"></p>
          </div>
        </div>

        <div id="login-prompt" class="surface-card" style="display:none;">
          <div class="surface-status-block">
            <p class="surface-page-desc" style="margin-bottom:var(--space-md);">请先登录后加入项目</p>
            <a href="login.html" class="btn btn-primary" style="display:inline-flex;">前往登录</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="statusbar">
    <div class="status-item"><span>加入项目</span></div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script>
    const API_BASE = window.SDOC_API_BASE || 'http://localhost:8000';
    let inviteToken = '';

    function mapJoinInviteError(raw) {
      const s = String(raw || '');
      if (s === '邀请链接已达使用上限') return '手慢无，邀请次数以达到上线~';
      if (s === '链接已被撤销') return '管理员突然把我撤回了，呜呜呜~';
      return s;
    }

    async function initJoinPage() {
      const params = new URLSearchParams(location.search);
      inviteToken = params.get('token') || '';
      if (!inviteToken) {
        showErr('无效的邀请链接');
        return;
      }
      if (!Auth.isLoggedIn()) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('login-prompt').style.display = 'block';
        sessionStorage.setItem('pendingInvitationToken', inviteToken);
        return;
      }
      try {
        const resp = await fetch(API_BASE + '/api/invitation-links/' + encodeURIComponent(inviteToken) + '/info');
        const e = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          showErr(e.error || '邀请无效');
          return;
        }
        const data = e;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('invitation-info').style.display = 'block';
        document.getElementById('project-name').textContent = data.projectName || '';
        document.getElementById('inviter-name').textContent = data.inviterName || '';
        document.getElementById('granted-role').textContent = data.role === 'editor' ? '可编辑' : '只读';
        const rem = data.maxUses === -1 ? '无限制' : String((data.maxUses - data.usedCount));
        document.getElementById('remaining-uses').textContent = rem;
        document.getElementById('join-btn').onclick = confirmJoin;
      } catch (err) {
        showErr('网络错误');
      }
    }

    function showErr(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-info').style.display = 'block';
      document.getElementById('error-message').textContent = mapJoinInviteError(msg);
    }

    async function confirmJoin() {
      const resp = await fetch(API_BASE + '/api/join', {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, Auth.getAuthHeaders()),
        body: JSON.stringify({ token: inviteToken })
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) { alert(mapJoinInviteError(data.error) || '加入失败'); return; }
      if (data.projectId) {
        sessionStorage.setItem('sdoc_collab_project_id', data.projectId);
        sessionStorage.setItem('sdoc_collab_enabled', '1');
      }
      alert('成功加入项目');
      location.href = 'edit.html';
    }

    window.addEventListener('load', () => {
      const pending = sessionStorage.getItem('pendingInvitationToken');
      if (pending && Auth.isLoggedIn()) {
        sessionStorage.removeItem('pendingInvitationToken');
        location.href = 'join.html?token=' + encodeURIComponent(pending);
        return;
      }
      initJoinPage();
    });
  </script>
</body>

</html>
