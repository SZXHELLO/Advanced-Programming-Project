        // ===== 页面管理 =====
        async function handleImageImport(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            if (!AppState.project) {
                openModal('projectModal');
            }

            const imageFiles = [];
            const pdfFiles = [];
            const unsupportedFiles = [];

            files.forEach(file => {
                if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
                    pdfFiles.push(file);
                } else if (file.type.startsWith('image/')) {
                    imageFiles.push(file);
                } else {
                    unsupportedFiles.push(file.name);
                }
            });

            if (unsupportedFiles.length > 0) {
                alert('以下文件格式暂不支持：\n' + unsupportedFiles.join('\n'));
            }

            try {
                for (let i = 0; i < imageFiles.length; i++) {
                    await importImageFile(imageFiles[i], i);
                }

                for (const pdfFile of pdfFiles) {
                    await importPdfFile(pdfFile);
                }
            } catch (err) {
                alert(err.message || '导入失败，请重试');
            }

            event.target.value = '';
        }

        function importImageFile(file, index) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        addPage({
                            id: 'page_' + Date.now() + '_' + index,
                            pageNo: AppState.pages.length + 1,
                            imageSrc: e.target.result,
                            width: img.width,
                            height: img.height
                        });
                        resolve();
                    };
                    img.onerror = () => reject(new Error('图片读取失败：' + file.name));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败：' + file.name));
                reader.readAsDataURL(file);
            });
        }

        function parsePageRange(input, totalPages) {
            const text = (input || '').trim();
            if (!text) {
                return Array.from({ length: totalPages }, (_, i) => i + 1);
            }

            const pages = new Set();
            const parts = text.split(',').map(s => s.trim()).filter(Boolean);
            if (parts.length === 0) {
                throw new Error('页码范围不能为空');
            }

            parts.forEach(part => {
                if (/^\d+$/.test(part)) {
                    const page = Number(part);
                    if (page < 1 || page > totalPages) {
                        throw new Error(`页码 ${page} 超出范围（1-${totalPages}）`);
                    }
                    pages.add(page);
                    return;
                }

                const match = part.match(/^(\d+)\s*-\s*(\d+)$/);
                if (!match) {
                    throw new Error(`无效范围格式：${part}`);
                }

                const start = Number(match[1]);
                const end = Number(match[2]);
                if (start > end) {
                    throw new Error(`范围起始页不能大于结束页：${part}`);
                }
                if (start < 1 || end > totalPages) {
                    throw new Error(`范围 ${part} 超出总页数（1-${totalPages}）`);
                }
                for (let p = start; p <= end; p++) {
                    pages.add(p);
                }
            });

            return Array.from(pages).sort((a, b) => a - b);
        }

        function requestPdfPageRange(totalPages, fileName) {
            pdfRangeTotalPages = totalPages;
            return new Promise((resolve) => {
                pdfRangeResolver = resolve;
                document.getElementById('pdfRangeModalTitle').textContent = `导入 PDF 页码范围 - ${fileName}`;
                document.getElementById('pdfTotalPagesHint').textContent = `总页数：${totalPages}`;
                const input = document.getElementById('pdfPageRangeInput');
                input.value = '';
                openModal('pdfRangeModal');
                setTimeout(() => input.focus(), 0);
            });
        }

        function confirmPdfRangeSelection() {
            if (!pdfRangeResolver) return;
            const inputValue = document.getElementById('pdfPageRangeInput').value;
            try {
                const pages = parsePageRange(inputValue, pdfRangeTotalPages);
                const resolver = pdfRangeResolver;
                pdfRangeResolver = null;
                closeModal('pdfRangeModal');
                resolver(pages);
            } catch (err) {
                alert(err.message);
            }
        }

        function cancelPdfRangeSelection() {
            if (!pdfRangeResolver) return;
            const resolver = pdfRangeResolver;
            pdfRangeResolver = null;
            closeModal('pdfRangeModal');
            resolver(null);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && pdfRangeResolver) {
                cancelPdfRangeSelection();
            }
        });

        async function importPdfFile(file) {
            if (!window.pdfjsLib) {
                throw new Error('PDF 解析库加载失败，请检查网络后重试');
            }
            if (window.pdfjsLib.GlobalWorkerOptions) {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDF_WORKER_SRC;
            }

            setStatus('正在读取 PDF：' + file.name);
            const buffer = await file.arrayBuffer();
            const pdf = await window.pdfjsLib.getDocument({ data: buffer }).promise;
            const selectedPages = await requestPdfPageRange(pdf.numPages, file.name);
            if (!selectedPages || selectedPages.length === 0) {
                setStatus('已取消 PDF 导入');
                return;
            }

            const failedPages = [];
            for (let i = 0; i < selectedPages.length; i++) {
                const pageNo = selectedPages[i];
                try {
                    setStatus(`正在导入 ${file.name}：第 ${pageNo} 页（${i + 1}/${selectedPages.length}）`);
                    const page = await pdf.getPage(pageNo);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = Math.round(viewport.width);
                    canvas.height = Math.round(viewport.height);
                    await page.render({ canvasContext: ctx, viewport }).promise;
                    addPage({
                        id: `page_${Date.now()}_${pageNo}_${Math.random().toString(36).slice(2, 8)}`,
                        pageNo: AppState.pages.length + 1,
                        imageSrc: canvas.toDataURL('image/png'),
                        width: canvas.width,
                        height: canvas.height
                    });
                } catch (err) {
                    failedPages.push(pageNo);
                }
            }

            if (failedPages.length > 0) {
                alert(`PDF 已部分导入，失败页码：${failedPages.join(', ')}`);
            }
            setStatus(`PDF 导入完成：${selectedPages.length - failedPages.length}/${selectedPages.length} 页`);
        }

        function addPage(page, options = {}) {
            if (!page?.id || !page?.imageSrc) return false;
            const exists = AppState.pages.some(p => p.id === page.id);
            if (exists) return false;

            const emitCollab = options.emitCollab !== false;
            const markModifiedFlag = options.markModified !== false;
            const saveFlag = options.save !== false;

            const normalized = JSON.parse(JSON.stringify(page));
            normalized.pageNo = AppState.pages.length + 1;
            AppState.pages.push(normalized);

            if (saveFlag) {
                AppState.save();
            }
            updateThumbnailList();

            if (AppState.pages.length === 1) {
                loadPage(0);
            }

            updatePageNavButtons();
            updateStatusBar();
            if (markModifiedFlag) {
                markAsModified();
            }
            if (emitCollab) {
                collabEmitPageAdd(normalized);
                collabEmitPagesReplace(AppState.pages);
            }
            return true;
        }

        function loadPage(index) {
            if (index < 0 || index >= AppState.pages.length) return;

            AppState.currentPageIndex = index;
            const page = AppState.pages[index];

            mainCanvas.width = page.width;
            mainCanvas.height = page.height;
            annotationCanvas.width = page.width;
            annotationCanvas.height = page.height;
            interactionCanvas.width = page.width;
            interactionCanvas.height = page.height;

            const img = new Image();
            img.onload = () => {
                mainCtx.drawImage(img, 0, 0);
                hideEmptyState();
                redrawAnnotations();
                updateAnnotationList();
            };
            img.src = page.imageSrc;

            updatePageIndicator();
            updateThumbnailList();
            updatePageNavButtons();
            updateStatusBar();
            if (collabEnabled && isCollabSocketOpen()) {
                collabEmitPageSyncRequest(page.id);
            }
        }

        function updateThumbnailList() {
            const container = document.getElementById('thumbnailList');

            if (AppState.pages.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 16px; color: var(--color-text-light); font-size: 11px;">暂无页面</div>';
                return;
            }

            container.innerHTML = AppState.pages.map((page, index) => `
                <div class="thumbnail-item ${index === AppState.currentPageIndex ? 'active' : ''}" onclick="loadPage(${index})">
                    <img src="${page.imageSrc}" alt="Page ${index + 1}">
                    <span class="thumbnail-page">${index + 1}</span>
                    <button class="thumbnail-delete" onclick="event.stopPropagation(); deletePage(${index})">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            `).join('');
        }

        function deletePage(index, options = {}) {
            if (!Number.isInteger(index) || index < 0 || index >= AppState.pages.length) return;
            const emitCollab = options.emitCollab !== false;
            const markModifiedFlag = options.markModified !== false;
            const saveFlag = options.save !== false;
            const targetPage = AppState.pages[index];
            const targetPageId = targetPage?.id || null;

            if (AppState.pages.length <= 1) {
                AppState.pages = [];
                AppState.annotations = [];
                AppState.currentPageIndex = 0;
                if (saveFlag) {
                    AppState.save();
                }
                showEmptyState();
                clearCanvases();
                selectedAnnotation = null;
                clearPropertyPanel();
                updateAnnotationList();
            } else {
                const pageId = AppState.pages[index].id;
                AppState.annotations = AppState.annotations.filter(a => a.pageId !== pageId);
                AppState.pages.splice(index, 1);
                AppState.pages.forEach((p, i) => p.pageNo = i + 1);

                if (AppState.currentPageIndex >= AppState.pages.length) {
                    AppState.currentPageIndex = AppState.pages.length - 1;
                }
                if (saveFlag) {
                    AppState.save();
                }
                loadPage(AppState.currentPageIndex);
            }

            updateThumbnailList();
            updatePageNavButtons();
            updateStatusBar();
            if (markModifiedFlag) {
                markAsModified();
            }
            if (emitCollab) {
                if (targetPageId) {
                    collabEmitPageDelete(targetPageId);
                }
                collabEmitPagesReplace(AppState.pages);
            }
        }

        function goToFirstPage() { loadPage(0); }
        function goToPrevPage() { loadPage(AppState.currentPageIndex - 1); }
        function goToNextPage() { loadPage(AppState.currentPageIndex + 1); }
        function goToLastPage() { loadPage(AppState.pages.length - 1); }

        function updatePageNavButtons() {
            const btns = document.querySelectorAll('.page-nav-btn');
            if (btns.length >= 4) {
                btns[0].disabled = AppState.currentPageIndex <= 0;
                btns[1].disabled = AppState.currentPageIndex <= 0;
                btns[2].disabled = AppState.currentPageIndex >= AppState.pages.length - 1;
                btns[3].disabled = AppState.currentPageIndex >= AppState.pages.length - 1;
            }
        }

        function updatePageIndicator() {
            document.getElementById('pageIndicator').textContent =
                `${AppState.currentPageIndex + 1} / ${Math.max(1, AppState.pages.length)}`;
        }

        // ===== 缩放 =====
        function zoomIn() {
            zoom = Math.min(4, zoom + 0.25);
            applyZoom();
        }

        function zoomOut() {
            zoom = Math.max(0.25, zoom - 0.25);
            applyZoom();
        }

        function applyZoom() {
            const wrapper = document.getElementById('canvasWrapper');
            wrapper.style.transform = `scale(${zoom})`;
            document.getElementById('zoomValue').textContent = Math.round(zoom * 100) + '%';
            document.getElementById('statusZoom').textContent = Math.round(zoom * 100) + '%';
        }

        function handleWheelZoom(e) {
            if (e.ctrlKey) {
                e.preventDefault();
                if (e.deltaY < 0) zoomIn();
                else zoomOut();
            }
        }

        // ===== 项目管理 =====

        function fillProjectForm(project = {}) {
            document.getElementById('projectTitle').value = project.title || '';
            document.getElementById('projectAuthor').value = project.author || '';
            document.getElementById('projectDynasty').value = project.dynasty || '';
            document.getElementById('projectBook').value = project.book || '';
            document.getElementById('projectVolume').value = project.volume || '';
        }

        function createNewProject() {
            fillProjectForm(AppState.project || {});
            openModal('projectModal');
        }

        function isProjectInfoComplete() {
            return AppState.project &&
                AppState.project.title &&
                AppState.project.author &&
                AppState.project.dynasty &&
                AppState.project.book &&
                AppState.project.volume;
        }

        function confirmNewProject() {
            leaveCollabForContextSwitch();
            const title = document.getElementById('projectTitle').value.trim();
            if (!title) {
                alert('请输入古籍标题');
                return;
            }

            const existingProject = AppState.project || {};
            AppState.project = {
                id: existingProject.id || ('proj_' + Date.now()),
                title: title,
                author: document.getElementById('projectAuthor').value.trim(),
                dynasty: document.getElementById('projectDynasty').value.trim(),
                book: document.getElementById('projectBook').value.trim(),
                volume: document.getElementById('projectVolume').value.trim()
            };

            AppState.save();
            closeModal('projectModal');
            setStatus(existingProject.id ? '项目已更新' : '项目已创建');
        }

        function handleProjectOpen(event) {
            const file = event.target.files[0];
            if (!file) return;
            leaveCollabForContextSwitch();

            ProjectManager.import(file).then(() => {
                updateUI();
                if (AppState.pages.length > 0) {
                    loadPage(0);
                }
            }).catch(err => {
                alert(err.message);
            });

            event.target.value = '';
        }

        async function saveProject() {
            // 1. 检查 AppState 数据是否完整
            if (!isProjectInfoComplete()) {
                alert('请先完善并确认项目基本信息（标题、作者、朝代等）');
                createNewProject(); // 自动打开弹窗
                return; // 中止程序，不执行后面的 AppState.save()
            }

            // 2. 若信息完整，执行原有程序
            AppState.save();

            // 3. 同步到数据库（保存“项目快照”）
            try {
                const snapshotPayload = {
                    project: AppState.project,
                    pages: AppState.pages,
                    annotations: AppState.annotations,
                    customChars: AppState.customChars,
                    exportedAt: new Date().toISOString()
                };

                await fetch("http://localhost:8000/api/projects", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(snapshotPayload)
                });
                setStatus('项目已保存到数据库', 'saved');
            } catch (e) {
                console.warn('saveProject db sync failed:', e);
                setStatus('项目已保存（本地），数据库同步失败', '');
            }

            // 4. 同步保留原有：导出 .sdocproj（作为本地备份/离线迁移）
            ProjectManager.export();
        }

        function handleExportXML() {
            //检查信息是否已经填写完整
            if (isProjectInfoComplete()) {
                // 如果信息已输入，按原计划跳转到导出页面
                window.location.href = 'exportXml.html';
            } else {
                // 如果信息不完整，提示并自动打开“新建”弹窗
                alert('请先完善项目基本信息（标题、作者、朝代等）');
                createNewProject();
            }
        }


        // ===== 撤销/重做 =====
        function saveUndoState() {
            undoStack.push(JSON.stringify(AppState.annotations));
            redoStack = [];
        }

        function undoAction() {
            if (undoStack.length === 0) return;
            redoStack.push(JSON.stringify(AppState.annotations));
            AppState.annotations = JSON.parse(undoStack.pop());
            selectedAnnotation = null;
            redrawAnnotations();
            updateAnnotationList();
            clearPropertyPanel();
            collabEmitAnnotationsReplace();
            markAsModified();
        }

        function redoAction() {
            if (redoStack.length === 0) return;
            undoStack.push(JSON.stringify(AppState.annotations));
            AppState.annotations = JSON.parse(redoStack.pop());
            selectedAnnotation = null;
            redrawAnnotations();
            updateAnnotationList();
            clearPropertyPanel();
            collabEmitAnnotationsReplace();
            markAsModified();
        }

        // ===== UI更新 =====
        function updateUI() {
            updateThumbnailList();
            updatePageNavButtons();
            updatePageIndicator();
            updateAnnotationList();
            updateCustomCharsGrid();
            updateStatusBar();

            if (AppState.pages.length > 0) {
                loadPage(AppState.currentPageIndex);
            } else {
                showEmptyState();
            }
        }

        function updateStatusBar() {
            document.getElementById('statusPage').textContent =
                AppState.pages.length > 0 ? `${AppState.currentPageIndex + 1}/${AppState.pages.length}` : '-';
            document.getElementById('statusAnnotations').textContent = AppState.annotations.length;
        }

        function updateCustomCharsGrid() {
            const container = document.getElementById('customCharsGrid');
            document.getElementById('customCharCount').textContent = AppState.customChars.length + '个';

            if (AppState.customChars.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 12px; color: var(--color-text-light); font-size: 11px;">暂无造字</div>';
                return;
            }

            container.innerHTML = AppState.customChars.map(char => `
                <div class="custom-char-item" title="${char.name}">
                    <img src="${char.imageData}" alt="${char.name}" onclick="useCustomChar('${char.id}')">
                    <button class="custom-char-delete" onclick="event.stopPropagation(); deleteCustomChar('${char.id}')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            `).join('');

        }

        function deleteCustomChar(charId) {
            // 从全局状态中移除指定造字
            AppState.customChars = AppState.customChars.filter(c => c.id !== charId);
            AppState.save();                // 保存到 localStorage
            updateCustomCharsGrid();        // 刷新造字列表
            setStatus('造字已删除');       // 可选：更新底部状态栏提示
        }

        function useCustomChar(charId) {
            const char = AppState.customChars.find(c => c.id === charId);
            if (char && selectedAnnotation) {
                selectedAnnotation.simplifiedChar = char.name;
                updatePropertyPanel();
                updateAnnotationList();
                markAsModified();
            }
        }

        function markAsModified() {
            AppState.save();
            document.getElementById('statusDot').classList.add('modified');
            document.getElementById('statusText').textContent = '已修改';
        }

        function setStatus(text, type) {
            document.getElementById('statusText').textContent = text;
            if (type === 'saved') {
                document.getElementById('statusDot').classList.remove('modified');
            }
        }

        function showEmptyState() {
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('canvasWrapper').style.display = 'none';
        }

        function hideEmptyState() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('canvasWrapper').style.display = 'block';
        }

        function clearCanvases() {
            if (mainCtx) mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            if (annotationCtx) annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
            if (interactionCtx) interactionCtx.clearRect(0, 0, interactionCanvas.width, interactionCanvas.height);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);

        <!--附加内容-->
        function checkProjectInfoComplete() {
            if (!AppState.project ||
                !AppState.project.title ||
                !AppState.project.author ||
                !AppState.project.dynasty) {
                return false;
            }
            return true;
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .inland-security-footer {
            position: fixed;
            z-index: 10;
            bottom: 0;
            right: 0;
            width: fit-content;
            display: flex;
            justify-content: flex-end;
        }

        .tooltip-container {
            position: relative;
        }

        .trigger-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding: 8px;
            background-color: transparent;
            border-radius: 8px;
            cursor: pointer;
        }

        .minimax-link {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 300;
            color: #adadad;
            text-decoration: none;
        }

        .minimax-link:visited {
            color: #adadad;
        }

        .minimax-link:hover {
            color: #666666;
        }

        .tooltip-content {
            position: absolute;
            bottom: 100%;
            right: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 8px;
            padding-bottom: 16px;
            /* 8px 内容间距 + 8px 用于鼠标移动的透明区域 */
            font-size: 12px;
            line-height: 17px;
            background-color: #fafafa;
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            color: #171717;
        }

        /* 创建透明的连接区域，让鼠标可以平滑移动到 tooltip */
        .tooltip-content::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 16px;
        }

        .tooltip-container:hover .tooltip-content {
            display: flex;
        }

        .info-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .beian-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #171717;
        }

        .beian-icon {
            width: 14px;
            height: 14px;
            margin-right: 2px;
        }

        .underline-text {
            color: #171717;
            text-decoration: underline;
        }

        .underline-text:hover {
            color: #000000;
        }

        /* 深色模式支持 */
        @media (prefers-color-scheme: dark) {
            .trigger-content {
                background-color: transparent;
            }

            .minimax-link,
            .minimax-link:visited {
                color: #666666;
            }

            .minimax-link:hover {
                color: #adadad;
            }

            .tooltip-content {
                background-color: #262626;
                color: #ededed;
            }

            .beian-link,
            .underline-text {
                color: #ededed;
            }

            .underline-text:hover {
                color: #ffffff;
            }
        }
    </style>


</body>
