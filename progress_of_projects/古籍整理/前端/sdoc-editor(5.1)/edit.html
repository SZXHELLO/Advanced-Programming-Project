<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古籍编辑 | SDOC Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 编辑页特有样式 */
        .edit-layout {
            display: flex;
            height: calc(100vh - 56px - 32px);
        }

        /* 左侧面板 */
        .edit-left-panel {
            width: 260px;
            background: #fff;
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-section {
            padding: var(--space-sm);
            border-bottom: 1px solid var(--color-border);
        }

        .panel-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-ink);
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .panel-title svg {
            width: 14px;
            height: 14px;
            color: var(--color-cinnabar);
        }

        .project-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }

        .project-btn {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            padding: var(--space-xs) var(--space-sm);
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            color: var(--color-text);
            transition: all var(--transition-fast);
            font-family: inherit;
            width: 100%;
            text-align: left;
        }

        .project-btn:hover {
            background: #EDE8E0;
            border-color: var(--color-azurite);
        }

        .project-btn svg {
            width: 14px;
            height: 14px;
            color: var(--color-azurite);
        }

        .thumbnail-list {
            flex: 1;
            display: flex !important;
            flex-direction: column !important;
            gap: var(--space-xs);
            overflow-y: auto;
            padding: var(--space-xs);
        }

        .thumbnail-item {
            position: relative;
            width: 100%;
            height: auto;
            flex: 0 0 auto;
            margin-bottom: 0;
            border: 2px solid transparent;
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .thumbnail-item:hover {
            border-color: var(--color-azurite);
        }

        .thumbnail-item.active {
            border-color: var(--color-cinnabar);
            box-shadow: 0 0 0 2px rgba(200, 74, 50, 0.2);
        }

        .thumbnail-item img {
            width: 100%;
            display: block;
            height: auto;
            max-height: 400px;
            object-fit: contain;
        }

        .thumbnail-page {
            position: absolute;
            bottom: 2px;
            left: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 2px;
        }

        .thumbnail-delete {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(200, 74, 50, 0.9);
            color: white;
            border: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transition: opacity var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail-item:hover .thumbnail-delete {
            opacity: 1;
        }

        /* 主编辑区域 */
        .edit-main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #E8E4DC;
            overflow: hidden;
        }

        .editor-toolbar {
            background: #fff;
            padding: var(--space-xs) var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            border-bottom: 1px solid var(--color-border);
        }

        .page-nav {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .page-nav-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--color-text);
            transition: all var(--transition-fast);
        }

        .page-nav-btn:hover:not(:disabled) {
            background: var(--color-azurite);
            color: white;
            border-color: var(--color-azurite);
        }

        .page-nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-nav-btn svg {
            width: 14px;
            height: 14px;
        }

        .page-indicator {
            font-size: 12px;
            color: var(--color-text);
            min-width: 50px;
            text-align: center;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            margin-left: auto;
        }

        .zoom-value {
            font-size: 12px;
            color: var(--color-text-light);
            min-width: 45px;
            text-align: center;
        }

        .collab-leave-btn {
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            display: none;
        }

        .collab-leave-btn:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* 画布容器 */
        .canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md);
            position: relative;
        }

        .canvas-wrapper {
            position: relative;
            background: #fff;
            box-shadow: var(--shadow-lg);
            transform-origin: center center;
        }

        #mainCanvas {
            display: block;
            cursor: crosshair;
        }

        #annotationLayer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #interactionLayer {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        /* 右侧面板 */
        .edit-right-panel {
            width: 300px;
            background: #fff;
            border-left: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .property-section {
            padding: var(--space-sm);
            border-bottom: 1px solid var(--color-border);
        }

        .property-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-ink);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            margin-bottom: var(--space-sm);
        }

        .property-title svg {
            width: 14px;
            height: 14px;
            color: var(--color-cinnabar);
        }

        .mark-type-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-xs);
        }

        .mark-type-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: var(--space-xs);
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 10px;
            color: var(--color-text);
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .mark-type-btn:hover {
            border-color: var(--color-azurite);
        }

        .mark-type-btn.active {
            background: var(--color-azurite);
            color: white;
            border-color: var(--color-azurite);
        }

        .mark-type-btn svg {
            width: 16px;
            height: 16px;
        }

        /* 属性类型选择器 */
        .attr-type-selector {
            display: flex;
            gap: var(--space-xs);
            margin-top: var(--space-sm);
        }

        .attr-type-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: var(--space-xs);
            background: var(--color-paper);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 11px;
            color: var(--color-text);
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .attr-type-btn:hover {
            border-color: var(--color-azurite);
        }

        .attr-type-btn.active {
            color: white;
            border-color: transparent;
        }

        .attr-type-btn[data-type="字"].active {
            background: var(--mark-red);
        }

        .attr-type-btn[data-type="词"].active {
            background: var(--mark-blue);
        }

        .attr-type-btn[data-type="句子"].active {
            background: var(--mark-green);
        }

        .attr-type-btn[data-type="标题"].active {
            background: var(--mark-orange);
        }

        .attr-type-btn[data-type="删除"].active {
            background: #7A7A7A;
        }

        .attr-type-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-bottom: 2px;
        }

        .annotation-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-xs);
        }

        .annotation-card {
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: var(--space-sm);
            margin-bottom: var(--space-xs);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .annotation-card:hover {
            border-color: var(--color-azurite);
            box-shadow: var(--shadow-sm);
        }

        .annotation-card.selected {
            border-color: var(--color-cinnabar);
            background: #FDF8F7;
        }

        .annotation-preview {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .annotation-char {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 20px;
            font-family: 'Noto Serif SC', serif;
        }

        .annotation-info {
            flex: 1;
        }

        .annotation-simplified {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-ink);
            margin-bottom: 2px;
        }

        .annotation-type {
            font-size: 10px;
            color: var(--color-text-light);
        }

        .annotation-actions {
            display: flex;
            gap: var(--space-xs);
        }

        .annotation-action-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--color-text-light);
            transition: all var(--transition-fast);
        }

        .annotation-action-btn:hover {
            background: var(--color-azurite);
            color: white;
            border-color: var(--color-azurite);
        }

        .annotation-action-btn.delete:hover {
            background: var(--color-cinnabar);
            border-color: var(--color-cinnabar);
        }

        .annotation-action-btn svg {
            width: 12px;
            height: 12px;
        }

        /* 造字区 */
        .custom-chars-section {
            max-height: 180px;
            overflow: auto;
            border-top: 1px solid var(--color-border);
            padding: var(--space-sm);
        }

        .custom-chars-grid {

            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-xs);
        }

        .custom-char-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 20px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all var(--transition-fast);
            overflow: hidden;
            position: relative;
        }

        .custom-char-delete {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(200, 74, 50, 0.9);
            color: white;
            border: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .custom-char-item:hover {
            border-color: var(--color-azurite);
            background: #fff;
        }

        .custom-char-item:hover .custom-char-delete {
            opacity: 1;
        }

        .custom-char-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="js/common.js"></script>
    <script>
        // ===== 编辑页状态 =====
        let mainCanvas, annotationCanvas, interactionCanvas;
        let mainCtx, annotationCtx, interactionCtx;
        let selectedAnnotation = null;
        let currentTool = 'select';
        let currentColor = '#C84A32';
        let currentMarkType = 'box';
        let currentAttrType = '字';  // 属性类型：字/词/句子
        let defaultNewBoxAttr = '字';
        let defaultLassoAction = '词';
        let zoom = 1;
        let isDrawing = false;
        let startX, startY;
        let currentRect = null;
        let slashStartX, slashStartY;  // 斜线绘制起点
        let currentSlashPreview = null;
        let undoStack = [];
        let redoStack = [];
        let pdfRangeResolver = null;
        let pdfRangeTotalPages = 0;
        const COLLAB_KEYS = {
            enabled: 'sdoc_collab_enabled',
            projectId: 'sdoc_collab_project_id',
            onlineHint: 'sdoc_collab_online_hint'
        };
        let collabEnabled = false;
        let collabWs = null;
        let collabOnlineCount = 1;
        let collabProjectId = '';
        let collabSessionId = '';
        let collabDisplayName = '';
        let collabRemoteDrawings = new Map();
        let collabLastPreviewSentAt = 0;
        let collabLastReplaceVersion = 0;
        let collabLastPagesReplaceVersion = 0;
        let collabLastPageSyncVersion = 0;
        let collabLastPageSyncRequestAt = 0;
        let collabReconnectTimer = null;
        let collabStatusPollTimer = null;
        const COLLAB_PREVIEW_THROTTLE_MS = 60;
        const COLLAB_PAGE_SYNC_THROTTLE_MS = 200;
        const COLLAB_PAGE_SYNC_DEBUG = false;
        const PDF_WORKER_SRC = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDF_WORKER_SRC;
        }

        // ===== 初始化 =====
        function init() {
            mainCanvas = document.getElementById('mainCanvas');
            annotationCanvas = document.getElementById('annotationLayer');
            interactionCanvas = document.getElementById('interactionLayer');

            if (mainCanvas && annotationCanvas && interactionCanvas) {
                mainCtx = mainCanvas.getContext('2d');
                annotationCtx = annotationCanvas.getContext('2d');
                interactionCtx = interactionCanvas.getContext('2d');

                setupEventListeners();
                updateUI();
                initCollab();
            }
        }

        // ===== 事件监听 =====
        function setupEventListeners() {
            interactionCanvas.addEventListener('mousedown', handleCanvasMouseDown);
            interactionCanvas.addEventListener('mousemove', handleCanvasMouseMove);
            interactionCanvas.addEventListener('mouseup', handleCanvasMouseUp);
            interactionCanvas.addEventListener('mouseleave', handleCanvasMouseUp);

            document.getElementById('canvasContainer').addEventListener('wheel', handleWheelZoom);
            const leaveBtn = document.getElementById('collabLeaveBtn');
            if (leaveBtn) {
                leaveBtn.addEventListener('click', leaveCollabMode);
            }
            window.addEventListener('beforeunload', leaveCollabOnPageExit);
            window.addEventListener('pagehide', leaveCollabOnPageExit);
        }

        function toWsBaseUrl(apiBase) {
            if (!apiBase) return '';
            if (apiBase.startsWith('https://')) return apiBase.replace('https://', 'wss://');
            if (apiBase.startsWith('http://')) return apiBase.replace('http://', 'ws://');
            return apiBase;
        }

        function setCollabStatus(text, enabled) {
            const node = document.getElementById('statusCollab');
            const leaveBtn = document.getElementById('collabLeaveBtn');
            if (node) {
                node.textContent = text;
            }
            if (leaveBtn) {
                leaveBtn.style.display = enabled ? 'inline-flex' : 'none';
            }
        }

        function getCollabStatusText(count) {
            const safeCount = Number.isFinite(Number(count)) ? Number(count) : 1;
            if (safeCount <= 1) {
                return '单人编辑';
            }
            return `开启多人编辑：${safeCount}`;
        }

        function clearCollabTimers() {
            if (collabReconnectTimer) {
                clearTimeout(collabReconnectTimer);
                collabReconnectTimer = null;
            }
            if (collabStatusPollTimer) {
                clearInterval(collabStatusPollTimer);
                collabStatusPollTimer = null;
            }
        }

        function scheduleCollabReconnect(delayMs = 1200) {
            if (!collabEnabled) return;
            if (collabReconnectTimer) return;
            collabReconnectTimer = setTimeout(() => {
                collabReconnectTimer = null;
                connectCollab();
            }, delayMs);
        }

        function isCollabSocketOpen() {
            return !!(collabWs && collabWs.readyState === WebSocket.OPEN);
        }

        async function refreshCollabStatusFromApi() {
            if (!collabEnabled || !collabProjectId) return;
            try {
                const apiBase = (window.Auth && window.Auth.API_BASE) ? window.Auth.API_BASE : 'http://localhost:8000';
                const resp = await fetch(`${apiBase}/api/collab/status?projectId=${encodeURIComponent(collabProjectId)}`);
                if (!resp.ok) return;
                const data = await resp.json();
                const remoteCount = Number(data?.onlineCount || 1);
                collabOnlineCount = Number.isFinite(remoteCount) && remoteCount > 0 ? remoteCount : 1;
                setCollabStatus(getCollabStatusText(collabOnlineCount), true);
            } catch (_) {
                // 静默兜底，不打断编辑
            }
        }

        function initCollab() {
            const session = window.Auth && typeof window.Auth.getSession === 'function' ? window.Auth.getSession() : null;
            collabSessionId = session?.sessionId || '';
            collabDisplayName = session?.displayName || session?.username || '';
            collabProjectId = sessionStorage.getItem(COLLAB_KEYS.projectId) || AppState.project?.id || '';
            collabEnabled = sessionStorage.getItem(COLLAB_KEYS.enabled) === '1' && !!collabProjectId && !!collabSessionId;
            const hintCount = Number(sessionStorage.getItem(COLLAB_KEYS.onlineHint) || 1);
            collabOnlineCount = Number.isFinite(hintCount) && hintCount > 0 ? hintCount : 1;

            if (!collabEnabled) {
                setCollabStatus('多人编辑未开启', false);
                return;
            }

            setCollabStatus(getCollabStatusText(collabOnlineCount), true);
            connectCollab();
            clearCollabTimers();
            collabStatusPollTimer = setInterval(() => {
                refreshCollabStatusFromApi();
                if (!isCollabSocketOpen()) {
                    scheduleCollabReconnect();
                }
            }, 2500);
        }

        function connectCollab() {
            if (!collabEnabled || !collabSessionId || !collabProjectId) return;
            if (collabWs && (collabWs.readyState === WebSocket.OPEN || collabWs.readyState === WebSocket.CONNECTING)) {
                return;
            }
            const apiBase = (window.Auth && window.Auth.API_BASE) ? window.Auth.API_BASE : 'http://localhost:8000';
            const wsBase = toWsBaseUrl(apiBase);
            const wsUrl = `${wsBase}/ws/collab?sessionId=${encodeURIComponent(collabSessionId)}&projectId=${encodeURIComponent(collabProjectId)}`;

            collabWs = new WebSocket(wsUrl);
            collabWs.onopen = () => {
                collabWs.send(JSON.stringify({ type: 'join' }));
                refreshCollabStatusFromApi();
            };
            collabWs.onmessage = handleCollabMessage;
            collabWs.onclose = () => {
                if (collabEnabled) {
                    setCollabStatus(getCollabStatusText(collabOnlineCount), true);
                    scheduleCollabReconnect();
                }
            };
            collabWs.onerror = () => {
                setCollabStatus('多人编辑连接异常', collabEnabled);
            };
        }

        function handleCollabMessage(evt) {
            let payload;
            try {
                payload = JSON.parse(evt.data || '{}');
            } catch (_) {
                return;
            }

            if (payload.type === 'presence') {
                collabOnlineCount = Number(payload.onlineCount || 1);
                setCollabStatus(getCollabStatusText(collabOnlineCount), true);
                return;
            }

            if (payload.type === 'annotation_add') {
                if (!payload.annotation) return;
                applyRemoteAnnotation(payload.annotation);
                return;
            }

            if (payload.type === 'page_add') {
                if (!payload.page) return;
                applyRemotePageAdd(payload.page);
                return;
            }

            if (payload.type === 'page_delete') {
                if (!payload.pageId) return;
                applyRemotePageDelete(payload.pageId);
                return;
            }

            if (payload.type === 'pages_replace') {
                applyRemotePagesReplace(payload.pages, payload.version);
                return;
            }

            if (payload.type === 'annotations_add_many') {
                applyRemoteAnnotationsAddMany(payload.annotations);
                return;
            }

            if (payload.type === 'annotation_update') {
                if (!payload.annotation) return;
                applyRemoteAnnotationUpdate(payload.annotation);
                return;
            }

            if (payload.type === 'annotation_delete') {
                if (!payload.annotationId) return;
                applyRemoteAnnotationDelete(payload.annotationId);
                return;
            }

            if (payload.type === 'annotations_replace') {
                applyRemoteAnnotationsReplace(payload.annotations, payload.version);
                return;
            }

            if (payload.type === 'page_sync_request') {
                handleRemotePageSyncRequest(payload);
                return;
            }

            if (payload.type === 'page_sync_snapshot') {
                applyRemotePageSyncSnapshot(payload);
                return;
            }

            if (payload.type === 'drawing_preview') {
                const fromSessionId = payload.fromSessionId;
                if (!fromSessionId || fromSessionId === collabSessionId) return;
                if (!payload.drawing) {
                    collabRemoteDrawings.delete(fromSessionId);
                } else {
                    collabRemoteDrawings.set(fromSessionId, {
                        rect: payload.drawing.rect,
                        displayName: payload.displayName || '协同用户'
                    });
                }
                renderInteractionLayer();
            }
        }

        function leaveCollabMode() {
            if (!collabEnabled) return;
            if (collabWs && collabWs.readyState === WebSocket.OPEN) {
                collabWs.send(JSON.stringify({ type: 'leave' }));
                collabWs.close();
            }
            collabWs = null;
            collabEnabled = false;
            collabRemoteDrawings.clear();
            clearCollabTimers();
            sessionStorage.setItem(COLLAB_KEYS.enabled, '0');
            sessionStorage.removeItem(COLLAB_KEYS.onlineHint);
            setCollabStatus('多人编辑未开启', false);
            renderInteractionLayer();
        }

        function leaveCollabForContextSwitch() {
            if (!collabEnabled) return;
            leaveCollabMode();
        }

        function leaveCollabOnPageExit() {
            if (!collabEnabled) return;
            if (collabWs && collabWs.readyState === WebSocket.OPEN) {
                try {
                    collabWs.send(JSON.stringify({ type: 'leave' }));
                } catch (_) { }
                try {
                    collabWs.close(1000, 'page-exit');
                } catch (_) { }
            }
        }

        function collabEmit(event) {
            if (!collabEnabled || !collabWs || collabWs.readyState !== WebSocket.OPEN) return;
            collabWs.send(JSON.stringify(event));
        }

        function collabEmitAnnotationAdd(annotation) {
            if (!annotation) return;
            collabEmit({
                type: 'annotation_add',
                annotation
            });
        }

        function collabEmitPageAdd(page) {
            if (!page?.id) return;
            collabEmit({
                type: 'page_add',
                page
            });
        }

        function collabEmitPageDelete(pageId) {
            if (!pageId) return;
            collabEmit({
                type: 'page_delete',
                pageId
            });
        }

        function collabEmitPagesReplace(pages) {
            if (!Array.isArray(pages)) return;
            const version = Date.now();
            collabEmit({
                type: 'pages_replace',
                pages: pages.map(p => JSON.parse(JSON.stringify(p))),
                version
            });
            if (COLLAB_PAGE_SYNC_DEBUG) {
                console.debug('[collab:pages_replace:emit]', { version, count: pages.length });
            }
        }

        function collabEmitAnnotationsAddMany(annotations) {
            if (!Array.isArray(annotations) || annotations.length === 0) return;
            collabEmit({
                type: 'annotations_add_many',
                annotations
            });
        }

        function collabEmitAnnotationUpdate(annotation) {
            if (!annotation?.id) return;
            collabEmit({
                type: 'annotation_update',
                annotation
            });
        }

        function collabEmitAnnotationDelete(annotationId) {
            if (!annotationId) return;
            collabEmit({
                type: 'annotation_delete',
                annotationId
            });
        }

        function collabEmitAnnotationsReplace() {
            collabEmit({
                type: 'annotations_replace',
                annotations: AppState.annotations,
                version: Date.now()
            });
        }

        function collabEmitPageSyncRequest(pageId) {
            if (!pageId) return;
            const now = Date.now();
            if (now - collabLastPageSyncRequestAt < COLLAB_PAGE_SYNC_THROTTLE_MS) return;
            collabLastPageSyncRequestAt = now;
            collabEmit({
                type: 'page_sync_request',
                pageId,
                requestAt: now
            });
        }

        function collabEmitPageSyncSnapshot(pageId, targetSessionId) {
            if (!pageId || !targetSessionId) return;
            const pageAnnotations = AppState.annotations
                .filter(a => a.pageId === pageId)
                .map(a => JSON.parse(JSON.stringify(a)));
            collabEmit({
                type: 'page_sync_snapshot',
                pageId,
                annotations: pageAnnotations,
                version: Date.now(),
                targetSessionId
            });
        }

        function collabEmitDrawingPreview(drawing) {
            if (!collabEnabled) return;
            const now = Date.now();
            if (drawing && now - collabLastPreviewSentAt < COLLAB_PREVIEW_THROTTLE_MS) {
                return;
            }
            collabLastPreviewSentAt = now;
            collabEmit({
                type: 'drawing_preview',
                drawing
            });
        }

        function applyRemoteAnnotation(rawAnnotation) {
            const annotation = rawAnnotation ? JSON.parse(JSON.stringify(rawAnnotation)) : null;
            if (!annotation?.id) return;
            const exists = AppState.annotations.some(a => a.id === annotation.id);
            if (exists) return;
            ensureAnnotationRelations(annotation);
            AppState.annotations.push(annotation);
            AppState.save();
            redrawAnnotations();
            updateAnnotationList();
            updateStatusBar();
        }

        function applyRemotePageAdd(rawPage) {
            const page = rawPage ? JSON.parse(JSON.stringify(rawPage)) : null;
            if (!page?.id || !page?.imageSrc) return;
            addPage(page, { emitCollab: false, markModified: false, save: true });
        }

        function applyRemotePageDelete(pageId) {
            const id = String(pageId || '');
            if (!id) return;
            const index = AppState.pages.findIndex(p => p.id === id);
            if (index === -1) return;
            deletePage(index, { emitCollab: false, markModified: false, save: true });
        }

        function applyRemotePagesReplace(rawPages, version) {
            if (!Array.isArray(rawPages)) return;
            const v = Number(version || 0);
            if (v && v < collabLastPagesReplaceVersion) {
                if (COLLAB_PAGE_SYNC_DEBUG) {
                    console.debug('[collab:pages_replace:skip-old]', { version: v, lastVersion: collabLastPagesReplaceVersion });
                }
                return;
            }
            collabLastPagesReplaceVersion = Math.max(collabLastPagesReplaceVersion, v || Date.now());

            const normalizedPages = rawPages
                .map(p => p ? JSON.parse(JSON.stringify(p)) : null)
                .filter(p => p?.id && p?.imageSrc)
                .map((p, i) => ({ ...p, pageNo: i + 1 }));

            const currentIds = AppState.pages.map(p => p.id).join('|');
            const incomingIds = normalizedPages.map(p => p.id).join('|');
            if (currentIds === incomingIds && AppState.pages.length === normalizedPages.length) {
                if (COLLAB_PAGE_SYNC_DEBUG) {
                    console.debug('[collab:pages_replace:skip-same]', { version: v || collabLastPagesReplaceVersion, count: normalizedPages.length });
                }
                return;
            }

            const pageIdSet = new Set(normalizedPages.map(p => p.id));
            AppState.pages = normalizedPages;
            AppState.annotations = AppState.annotations.filter(a => pageIdSet.has(a.pageId));

            if (selectedAnnotation && !pageIdSet.has(selectedAnnotation.pageId)) {
                selectedAnnotation = null;
                clearPropertyPanel();
            }

            if (AppState.pages.length === 0) {
                AppState.currentPageIndex = 0;
                AppState.save();
                showEmptyState();
                clearCanvases();
                updateThumbnailList();
                updatePageNavButtons();
                updateStatusBar();
                return;
            }

            if (AppState.currentPageIndex >= AppState.pages.length) {
                AppState.currentPageIndex = AppState.pages.length - 1;
            }
            if (AppState.currentPageIndex < 0) {
                AppState.currentPageIndex = 0;
            }

            AppState.save();
            loadPage(AppState.currentPageIndex);
            if (COLLAB_PAGE_SYNC_DEBUG) {
                console.debug('[collab:pages_replace:applied]', { version: v || collabLastPagesReplaceVersion, count: normalizedPages.length });
            }
        }

        function applyRemoteAnnotationsAddMany(annotations) {
            if (!Array.isArray(annotations) || annotations.length === 0) return;
            let changed = false;
            annotations.forEach((raw) => {
                const annotation = raw ? JSON.parse(JSON.stringify(raw)) : null;
                if (!annotation?.id) return;
                const exists = AppState.annotations.some(a => a.id === annotation.id);
                if (exists) return;
                ensureAnnotationRelations(annotation);
                AppState.annotations.push(annotation);
                changed = true;
            });
            if (!changed) return;
            AppState.save();
            redrawAnnotations();
            updateAnnotationList();
            updateStatusBar();
        }

        function applyRemoteAnnotationUpdate(rawAnnotation) {
            const incoming = rawAnnotation ? JSON.parse(JSON.stringify(rawAnnotation)) : null;
            if (!incoming?.id) return;
            const target = AppState.annotations.find(a => a.id === incoming.id);
            if (!target) return;
            Object.assign(target, incoming);
            ensureAnnotationRelations(target);
            redrawAnnotations();
            updateAnnotationList();
            if (selectedAnnotation?.id === target.id) {
                selectedAnnotation = target;
                updatePropertyPanel();
            }
            updateStatusBar();
            AppState.save();
        }

        function applyRemoteAnnotationDelete(annotationId) {
            const before = AppState.annotations.length;
            cleanupRelationsBeforeDelete([annotationId]);
            AppState.annotations = AppState.annotations.filter(a => a.id !== annotationId);
            if (AppState.annotations.length === before) return;
            if (selectedAnnotation?.id === annotationId) {
                selectedAnnotation = null;
                clearPropertyPanel();
            }
            redrawAnnotations();
            updateAnnotationList();
            updateStatusBar();
            AppState.save();
        }

        function applyRemoteAnnotationsReplace(annotations, version) {
            const v = Number(version || 0);
            if (v && v < collabLastReplaceVersion) return;
            collabLastReplaceVersion = Math.max(collabLastReplaceVersion, v || Date.now());
            AppState.annotations = Array.isArray(annotations)
                ? annotations.map(a => ensureAnnotationRelations(a))
                : [];
            selectedAnnotation = null;
            redrawAnnotations();
            updateAnnotationList();
            clearPropertyPanel();
            updateStatusBar();
            AppState.save();
        }

        function handleRemotePageSyncRequest(payload) {
            const requesterSessionId = String(payload?.fromSessionId || '');
            const pageId = String(payload?.pageId || '');
            if (!requesterSessionId || requesterSessionId === collabSessionId || !pageId) return;
            collabEmitPageSyncSnapshot(pageId, requesterSessionId);
        }

        function applyRemotePageSyncSnapshot(payload) {
            const targetSessionId = String(payload?.targetSessionId || '');
            if (!targetSessionId || targetSessionId !== collabSessionId) return;

            const pageId = String(payload?.pageId || '');
            if (!pageId) return;

            const version = Number(payload?.version || 0);
            if (version && version < collabLastPageSyncVersion) return;
            collabLastPageSyncVersion = Math.max(collabLastPageSyncVersion, version || Date.now());

            const incoming = Array.isArray(payload?.annotations)
                ? payload.annotations.map(a => ensureAnnotationRelations(a))
                : [];

            AppState.annotations = AppState.annotations.filter(a => a.pageId !== pageId).concat(incoming);
            if (selectedAnnotation && selectedAnnotation.pageId === pageId) {
                selectedAnnotation = null;
                clearPropertyPanel();
            }

            redrawAnnotations();
            updateAnnotationList();
            updateStatusBar();
            AppState.save();
        }

        // ===== 工具选择 =====
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn[id$="Tool"]').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tool + 'Tool')?.classList.add('active');
            interactionCanvas.style.cursor = tool === 'select' ? 'default' : 'crosshair';
            syncAttrTypeSelector();
        }

        function syncAttrTypeSelector() {
            const attrTypeContainer = document.getElementById('attrTypeContainer');
            const boxSelector = document.getElementById('boxAttrTypeSelector');
            const lassoSelector = document.getElementById('lassoAttrTypeSelector');
            const colorMap = {
                '字': '#C84A32',
                '词': '#2B5F8E',
                '标题': '#D67B3C',
                '句子': '#5B8C5A',
                '删除': '#7A7A7A'
            };

            if (!attrTypeContainer || !boxSelector || !lassoSelector) return;

            if (currentTool === 'box') {
                attrTypeContainer.style.display = 'block';
                boxSelector.style.display = 'flex';
                lassoSelector.style.display = 'none';
                currentColor = colorMap[defaultNewBoxAttr] || currentColor;
                boxSelector.querySelectorAll('.attr-type-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.type === defaultNewBoxAttr);
                });
                return;
            }

            if (currentTool === 'lasso') {
                attrTypeContainer.style.display = 'block';
                boxSelector.style.display = 'none';
                lassoSelector.style.display = 'flex';
                currentColor = colorMap[defaultLassoAction] || currentColor;
                lassoSelector.querySelectorAll('.attr-type-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.type === defaultLassoAction);
                });
                return;
            }

            if (selectedAnnotation && selectedAnnotation.type === 'box') {
                attrTypeContainer.style.display = 'block';
                boxSelector.style.display = 'flex';
                lassoSelector.style.display = 'none';
                boxSelector.querySelectorAll('.attr-type-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.type === selectedAnnotation.attrType);
                });
                return;
            }

            attrTypeContainer.style.display = 'none';
        }

        // ===== 属性类型选择 =====
        function selectAttrType(btn) {
            document.querySelectorAll('.attr-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const selectedType = btn.dataset.type;

            // 根据属性类型自动设置颜色
            const colorMap = {
                '字': '#C84A32',    // --mark-red
                '词': '#2B5F8E',    // --mark-blue
                '标题': '#D67B3C', // --mark-orange
                '句子': '#5B8C5A',  // --mark-green
                '删除': '#7A7A7A'
            };
            const newColor = colorMap[selectedType];

            if (currentTool === 'box') {
                defaultNewBoxAttr = selectedType;
                currentColor = newColor;
            } else if (currentTool === 'lasso') {
                defaultLassoAction = selectedType;
                currentColor = newColor;
            } else {
                currentAttrType = selectedType;
                currentColor = newColor;
                if (selectedAnnotation && selectedAnnotation.type === 'box') {
                    selectedAnnotation.color = currentColor;
                    selectedAnnotation.attrType = currentAttrType;
                    redrawAnnotations();
                    updateAnnotationList();
                    collabEmitAnnotationUpdate(selectedAnnotation);
                    markAsModified();
                }
            }
        }
        // ===== 颜色选择 =====
        function selectColor(el) {
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');
            currentColor = el.dataset.color;

            // 取消属性类型按钮的激活状态（因为用户手动选择了颜色）
            if (currentMarkType === 'box') {
                document.querySelectorAll('.attr-type-btn').forEach(b => b.classList.remove('active'));
            }

            if (selectedAnnotation) {
                selectedAnnotation.color = currentColor;
                redrawAnnotations();
                updateAnnotationList();
                collabEmitAnnotationUpdate(selectedAnnotation);
                markAsModified();
            }
        }

        // ===== 标注类型选择 =====
        function selectMarkType(btn) {
            document.querySelectorAll('.mark-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMarkType = btn.dataset.type;

            // 显示/隐藏属性类型选择器
            const attrTypeContainer = document.getElementById('attrTypeContainer');
            if (currentMarkType === 'box') {
                attrTypeContainer.style.display = 'block';
            } else {
                attrTypeContainer.style.display = 'none';
            }

            if (selectedAnnotation) {
                selectedAnnotation.type = currentMarkType;
                redrawAnnotations();
                updateAnnotationList();
                markAsModified();
            }
        }

        // ===== 画布操作 =====
        function handleCanvasMouseDown(e) {
            if (!AppState.pages.length) return;

            const rect = interactionCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;

            if (currentTool === 'select') {
                const clicked = findAnnotationAt(x, y);
                if (clicked) {
                    selectAnnotation(clicked);
                } else {
                    deselectAnnotation();
                }
            } else if (currentTool === 'slash') {
                // 斜线绘制
                isDrawing = true;
                slashStartX = x;
                slashStartY = y;
                currentSlashPreview = null;
            } else {
                isDrawing = true;
                startX = x;
                startY = y;
                currentRect = { x, y, width: 0, height: 0 };
            }
        }

        function handleCanvasMouseMove(e) {
            if (!isDrawing) return;

            const rect = interactionCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;

            if (currentTool === 'slash') {
                currentSlashPreview = { x1: slashStartX, y1: slashStartY, x2: x, y2: y };
                renderInteractionLayer();
                collabEmitDrawingPreview({
                    rect: {
                        x: Math.min(slashStartX, x),
                        y: Math.min(slashStartY, y),
                        width: Math.abs(x - slashStartX),
                        height: Math.abs(y - slashStartY)
                    }
                });
            } else {
                currentRect.width = x - startX;
                currentRect.height = y - startY;
                drawCurrentRect();
                collabEmitDrawingPreview({
                    rect: {
                        x: currentRect.width > 0 ? currentRect.x : currentRect.x + currentRect.width,
                        y: currentRect.height > 0 ? currentRect.y : currentRect.y + currentRect.height,
                        width: Math.abs(currentRect.width),
                        height: Math.abs(currentRect.height)
                    }
                });
            }
        }

        function handleCanvasMouseUp(e) {
            if (!isDrawing) return;
            isDrawing = false;

            const rect = interactionCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;

            if (currentTool === 'slash') {
                // 创建斜线标注
                const distance = Math.sqrt(Math.pow(x - slashStartX, 2) + Math.pow(y - slashStartY, 2));
                if (distance > 10) {
                    createSlashAnnotation(slashStartX, slashStartY, x, y);
                }
            } else if (currentRect && Math.abs(currentRect.width) > 5 && Math.abs(currentRect.height) > 5) {
                const normalizedRect = {
                    x: currentRect.width > 0 ? currentRect.x : currentRect.x + currentRect.width,
                    y: currentRect.height > 0 ? currentRect.y : currentRect.y + currentRect.height,
                    width: Math.abs(currentRect.width),
                    height: Math.abs(currentRect.height)
                };

                if (currentTool === 'lasso') {
                    applyLassoAction(normalizedRect);
                } else {
                    createAnnotation(normalizedRect);
                }
            }

            currentRect = null;
            currentSlashPreview = null;
            collabEmitDrawingPreview(null);
            renderInteractionLayer();
        }

        function drawCurrentRect() {
            renderInteractionLayer();
        }

        function clearInteractionCanvas() {
            currentRect = null;
            currentSlashPreview = null;
            renderInteractionLayer();
        }

        function renderInteractionLayer() {
            interactionCtx.clearRect(0, 0, interactionCanvas.width, interactionCanvas.height);

            if (currentTool === 'slash' && currentSlashPreview) {
                interactionCtx.strokeStyle = '#E0E0E0';
                interactionCtx.lineWidth = 1;
                interactionCtx.setLineDash([5, 5]);
                interactionCtx.beginPath();
                interactionCtx.moveTo(currentSlashPreview.x1, currentSlashPreview.y1);
                interactionCtx.lineTo(currentSlashPreview.x2, currentSlashPreview.y2);
                interactionCtx.stroke();
                interactionCtx.setLineDash([]);
            } else if (currentRect) {
                interactionCtx.strokeStyle = currentColor;
                interactionCtx.lineWidth = 2;
                interactionCtx.setLineDash([5, 5]);
                interactionCtx.strokeRect(currentRect.x, currentRect.y, currentRect.width, currentRect.height);
                interactionCtx.setLineDash([]);
            }

            collabRemoteDrawings.forEach((entry) => {
                const rect = entry?.rect;
                if (!rect) return;
                const displayName = String(entry.displayName || '协同用户');
                interactionCtx.strokeStyle = '#2B5F8E';
                interactionCtx.lineWidth = 2;
                interactionCtx.setLineDash([6, 4]);
                interactionCtx.strokeRect(rect.x, rect.y, rect.width, rect.height);
                interactionCtx.setLineDash([]);

                const labelPaddingX = 8;
                const labelHeight = 20;
                interactionCtx.font = '12px Noto Sans SC';
                const textWidth = interactionCtx.measureText(displayName).width;
                const labelWidth = textWidth + labelPaddingX * 2;
                const labelX = rect.x;
                const labelY = rect.y + rect.height + 6;

                interactionCtx.fillStyle = 'rgba(43,95,142,0.92)';
                interactionCtx.fillRect(labelX, labelY, labelWidth, labelHeight);
                interactionCtx.fillStyle = '#fff';
                interactionCtx.textBaseline = 'middle';
                interactionCtx.fillText(displayName, labelX + labelPaddingX, labelY + labelHeight / 2);
            });
        }

        // ===== 标注操作 =====
        function ensureAnnotationRelations(ann) {
            if (ann.parentId === undefined) ann.parentId = null;
            if (!Array.isArray(ann.childIds)) ann.childIds = [];
            return ann;
        }

        function isAnnotationHiddenByMerge(ann) {
            if (!ann || !ann.parentId) return false;
            return selectedAnnotation?.id !== ann.id;
        }

        function cleanupRelationsBeforeDelete(idsToDelete) {
            const idSet = new Set(idsToDelete);
            const idMap = new Map(AppState.annotations.map(a => [a.id, ensureAnnotationRelations(a)]));

            idsToDelete.forEach(id => {
                const ann = idMap.get(id);
                if (!ann) return;

                if (ann.parentId && !idSet.has(ann.parentId)) {
                    const parent = idMap.get(ann.parentId);
                    if (parent) {
                        parent.childIds = parent.childIds.filter(childId => childId !== ann.id);
                    }
                }

                ann.childIds.forEach(childId => {
                    if (idSet.has(childId)) return;
                    const child = idMap.get(childId);
                    if (child && child.parentId === ann.id) {
                        child.parentId = null;
                    }
                });
            });
        }

        function isRectFullyInside(inner, outer) {
            return inner.x >= outer.x &&
                inner.y >= outer.y &&
                inner.x + inner.width <= outer.x + outer.width &&
                inner.y + inner.height <= outer.y + outer.height;
        }

        function getContainedAnnotationsByMode(rect, mode) {
            const pageId = AppState.pages[AppState.currentPageIndex]?.id;
            return AppState.annotations.filter(ann => {
                ensureAnnotationRelations(ann);
                if (ann.pageId !== pageId || ann.type !== 'box' || !ann.rect) return false;
                if (ann.parentId) return false;
                if (!isRectFullyInside(ann.rect, rect)) return false;

                if (mode === '词') return ann.attrType === '字';
                if (mode === '句子') return ann.attrType === '字' || ann.attrType === '词';
                if (mode === '标题') return ann.attrType === '字' || ann.attrType === '词' || ann.attrType === '句子';
                if (mode === '删除') return ann.attrType === '字' || ann.attrType === '词' || ann.attrType === '句子' || ann.attrType === '标题';
                return false;
            });
        }

        function sortByVerticalReadingOrder(list) {
            const columnTolerance = 20;
            return [...list].sort((a, b) => {
                const centerAX = a.rect.x + a.rect.width / 2;
                const centerBX = b.rect.x + b.rect.width / 2;
                const dx = centerBX - centerAX;
                if (Math.abs(dx) <= columnTolerance) {
                    const centerAY = a.rect.y + a.rect.height / 2;
                    const centerBY = b.rect.y + b.rect.height / 2;
                    return centerAY - centerBY;
                }
                return dx;
            });
        }

        function buildMergedText(list) {
            return list
                .map(ann => (ann.simplifiedChar || '').trim())
                .filter(Boolean)
                .join('');
        }

        function getBoundingRect(list) {
            const xs = list.map(ann => ann.rect.x);
            const ys = list.map(ann => ann.rect.y);
            const x2s = list.map(ann => ann.rect.x + ann.rect.width);
            const y2s = list.map(ann => ann.rect.y + ann.rect.height);

            const minX = Math.min(...xs);
            const minY = Math.min(...ys);
            const maxX = Math.max(...x2s);
            const maxY = Math.max(...y2s);

            return {
                x: minX,
                y: minY,
                width: maxX - minX,
                height: maxY - minY
            };
        }

        function applyLassoAction(rect) {
            const mode = defaultLassoAction;
            const targets = getContainedAnnotationsByMode(rect, mode);
            if (!targets.length) return;
            if (mode !== '删除' && mode !== '标题' && targets.length < 2) return;

            if (mode === '删除') {
                saveUndoState();
                const targetIds = targets.map(item => item.id);
                cleanupRelationsBeforeDelete(targetIds);
                const targetSet = new Set(targetIds);
                AppState.annotations = AppState.annotations.filter(ann => !targetSet.has(ann.id));
                if (selectedAnnotation && targetSet.has(selectedAnnotation.id)) {
                    selectedAnnotation = null;
                }
                collabEmitAnnotationsReplace();
            } else {
                const ordered = sortByVerticalReadingOrder(targets);
                const mergedText = buildMergedText(ordered);
                if (!mergedText) {
                    setStatus('所选标注未填写简体字，无法拼接');
                    return;
                }
                saveUndoState();
                const mergedRect = getBoundingRect(ordered);
                const colorMap = { '词': '#2B5F8E', '句子': '#5B8C5A', '标题': '#D67B3C' };

                const annotation = {
                    id: 'ann_' + Date.now(),
                    pageId: AppState.pages[AppState.currentPageIndex]?.id,
                    type: 'box',
                    rect: mergedRect,
                    color: colorMap[mode],
                    simplifiedChar: mergedText,
                    note: '',
                    attrType: mode,
                    parentId: null,
                    childIds: ordered.map(item => item.id)
                };
                AppState.annotations.push(annotation);
                collabEmitAnnotationAdd(annotation);
                // 词/句子/标题模式：让被合并的字/词/句子进入父子关系，画布按 isAnnotationHiddenByMerge 隐藏它们
                ordered.forEach(item => {
                    ensureAnnotationRelations(item);
                    item.parentId = annotation.id;
                });
                selectedAnnotation = annotation;
                collabEmitAnnotationsReplace();
            }

            redrawAnnotations();
            updateAnnotationList();
            updatePropertyPanel();
            updateStatusBar();
            markAsModified();
        }

        function findAnnotationAt(x, y) {
            for (let i = AppState.annotations.length - 1; i >= 0; i--) {
                const ann = AppState.annotations[i];
                ensureAnnotationRelations(ann);
                if (ann.pageId !== AppState.pages[AppState.currentPageIndex]?.id) continue;
                if (isAnnotationHiddenByMerge(ann)) continue;

                if (ann.type === 'slash') {
                    // 斜线检测（简化为矩形检测）
                    const minX = Math.min(ann.x1, ann.x2);
                    const maxX = Math.max(ann.x1, ann.x2);
                    const minY = Math.min(ann.y1, ann.y2);
                    const maxY = Math.max(ann.y1, ann.y2);
                    const padding = 5;
                    if (x >= minX - padding && x <= maxX + padding && y >= minY - padding && y <= maxY + padding) {
                        return ann;
                    }
                } else if (ann.rect) {
                    if (x >= ann.rect.x && x <= ann.rect.x + ann.rect.width &&
                        y >= ann.rect.y && y <= ann.rect.y + ann.rect.height) {
                        return ann;
                    }
                }
            }
            return null;
        }

        function redrawAnnotations() {
            annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);

            AppState.annotations.forEach(ann => {
                ensureAnnotationRelations(ann);
                if (ann.pageId !== AppState.pages[AppState.currentPageIndex]?.id) return;
                if (isAnnotationHiddenByMerge(ann)) return;

                const isSelected = selectedAnnotation?.id === ann.id;
                annotationCtx.strokeStyle = ann.color;
                annotationCtx.fillStyle = ann.color;

                switch (ann.type) {
                    case 'box':
                        annotationCtx.lineWidth = isSelected ? 3 : 2;
                        annotationCtx.strokeRect(ann.rect.x, ann.rect.y, ann.rect.width, ann.rect.height);
                        break;
                    case 'underline':
                        annotationCtx.lineWidth = isSelected ? 4 : 3;
                        annotationCtx.beginPath();
                        annotationCtx.moveTo(ann.rect.x, ann.rect.y + ann.rect.height);
                        annotationCtx.lineTo(ann.rect.x + ann.rect.width, ann.rect.y + ann.rect.height);
                        annotationCtx.stroke();
                        break;
                    case 'highlight':
                        annotationCtx.globalAlpha = 0.3;
                        annotationCtx.fillRect(ann.rect.x, ann.rect.y, ann.rect.width, ann.rect.height);
                        annotationCtx.globalAlpha = 1;
                        break;
                    case 'strikethrough':
                        annotationCtx.lineWidth = isSelected ? 4 : 3;
                        annotationCtx.beginPath();
                        annotationCtx.moveTo(ann.rect.x, ann.rect.y + ann.rect.height / 2);
                        annotationCtx.lineTo(ann.rect.x + ann.rect.width, ann.rect.y + ann.rect.height / 2);
                        annotationCtx.stroke();
                        break;
                    case 'slash':
                        annotationCtx.lineWidth = isSelected ? 2 : 1;
                        annotationCtx.beginPath();
                        annotationCtx.moveTo(ann.x1, ann.y1);
                        annotationCtx.lineTo(ann.x2, ann.y2);
                        annotationCtx.stroke();
                        break;
                }
            });
        }
