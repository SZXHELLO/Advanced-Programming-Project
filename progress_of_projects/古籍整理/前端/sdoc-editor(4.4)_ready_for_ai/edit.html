<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古籍编辑 | SDOC Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 编辑页特有样式 */
        .edit-layout {
            display: flex;
            height: calc(100vh - 56px - 32px);
        }

        /* 左侧面板 */
        .edit-left-panel {
            width: 260px;
            background: #fff;
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-section {
            padding: var(--space-sm);
            border-bottom: 1px solid var(--color-border);
        }

        .panel-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-ink);
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .panel-title svg {
            width: 14px;
            height: 14px;
            color: var(--color-cinnabar);
        }

        .project-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }

        .project-btn {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            padding: var(--space-xs) var(--space-sm);
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            color: var(--color-text);
            transition: all var(--transition-fast);
            font-family: inherit;
            width: 100%;
            text-align: left;
        }

        .project-btn:hover {
            background: #EDE8E0;
            border-color: var(--color-azurite);
        }

        .project-btn svg {
            width: 14px;
            height: 14px;
            color: var(--color-azurite);
        }

        .thumbnail-list {
            flex: 1;
            display: flex !important;
            flex-direction: column !important;
            gap: var(--space-xs);
            overflow-y: auto;
            padding: var(--space-xs);
        }

        .thumbnail-item {
            position: relative;
            width: 100%;
            height: auto;
            flex: 0 0 auto;
            margin-bottom: 0;
            border: 2px solid transparent;
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .thumbnail-item:hover {
            border-color: var(--color-azurite);
        }

        .thumbnail-item.active {
            border-color: var(--color-cinnabar);
            box-shadow: 0 0 0 2px rgba(200, 74, 50, 0.2);
        }

        .thumbnail-item img {
            width: 100%;
            display: block;
            height: auto;
            max-height: 400px;
            object-fit: contain;
        }

        .thumbnail-page {
            position: absolute;
            bottom: 2px;
            left: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 2px;
        }

        .thumbnail-delete {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(200, 74, 50, 0.9);
            color: white;
            border: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transition: opacity var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail-item:hover .thumbnail-delete {
            opacity: 1;
        }

        /* 主编辑区域 */
        .edit-main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #E8E4DC;
            overflow: hidden;
        }

        .editor-toolbar {
            background: #fff;
            padding: var(--space-xs) var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            border-bottom: 1px solid var(--color-border);
        }

        .page-nav {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .page-nav-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--color-text);
            transition: all var(--transition-fast);
        }

        .page-nav-btn:hover:not(:disabled) {
            background: var(--color-azurite);
            color: white;
            border-color: var(--color-azurite);
        }

        .page-nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-nav-btn svg {
            width: 14px;
            height: 14px;
        }

        .page-indicator {
            font-size: 12px;
            color: var(--color-text);
            min-width: 50px;
            text-align: center;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            margin-left: auto;
        }

        .zoom-value {
            font-size: 12px;
            color: var(--color-text-light);
            min-width: 45px;
            text-align: center;
        }

        /* 画布容器 */
        .canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md);
            position: relative;
        }

        .canvas-wrapper {
            position: relative;
            background: #fff;
            box-shadow: var(--shadow-lg);
            transform-origin: center center;
        }

        #mainCanvas {
            display: block;
            cursor: crosshair;
        }

        #annotationLayer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #interactionLayer {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        /* 右侧面板 */
        .edit-right-panel {
            width: 300px;
            background: #fff;
            border-left: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .property-section {
            padding: var(--space-sm);
            border-bottom: 1px solid var(--color-border);
        }

        .property-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-ink);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            margin-bottom: var(--space-sm);
        }

        .property-title svg {
            width: 14px;
            height: 14px;
            color: var(--color-cinnabar);
        }

        .mark-type-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-xs);
        }

        .mark-type-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: var(--space-xs);
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 10px;
            color: var(--color-text);
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .mark-type-btn:hover {
            border-color: var(--color-azurite);
        }

        .mark-type-btn.active {
            background: var(--color-azurite);
            color: white;
            border-color: var(--color-azurite);
        }

        .mark-type-btn svg {
            width: 16px;
            height: 16px;
        }

        /* 属性类型选择器 */
        .attr-type-selector {
            display: flex;
            gap: var(--space-xs);
            margin-top: var(--space-sm);
        }

        .attr-type-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: var(--space-xs);
            background: var(--color-paper);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 11px;
            color: var(--color-text);
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .attr-type-btn:hover {
            border-color: var(--color-azurite);
        }

        .attr-type-btn.active {
            color: white;
            border-color: transparent;
        }

        .attr-type-btn[data-type="字"].active {
            background: var(--mark-red);
        }

        .attr-type-btn[data-type="词"].active {
            background: var(--mark-blue);
        }

        .attr-type-btn[data-type="句子"].active {
            background: var(--mark-green);
        }

        .attr-type-btn[data-type="删除"].active {
            background: #7A7A7A;
        }

        .attr-type-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-bottom: 2px;
        }

        .annotation-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-xs);
        }

        .annotation-card {
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: var(--space-sm);
            margin-bottom: var(--space-xs);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .annotation-card:hover {
            border-color: var(--color-azurite);
            box-shadow: var(--shadow-sm);
        }

        .annotation-card.selected {
            border-color: var(--color-cinnabar);
            background: #FDF8F7;
        }

        .annotation-preview {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .annotation-char {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 20px;
            font-family: 'Noto Serif SC', serif;
        }

        .annotation-info {
            flex: 1;
        }

        .annotation-simplified {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-ink);
            margin-bottom: 2px;
        }

        .annotation-type {
            font-size: 10px;
            color: var(--color-text-light);
        }

        .annotation-actions {
            display: flex;
            gap: var(--space-xs);
        }

        .annotation-action-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--color-text-light);
            transition: all var(--transition-fast);
        }

        .annotation-action-btn:hover {
            background: var(--color-azurite);
            color: white;
            border-color: var(--color-azurite);
        }

        .annotation-action-btn.delete:hover {
            background: var(--color-cinnabar);
            border-color: var(--color-cinnabar);
        }

        .annotation-action-btn svg {
            width: 12px;
            height: 12px;
        }

        /* 造字区 */
        .custom-chars-section {
            max-height: 180px;
            overflow: auto;
            border-top: 1px solid var(--color-border);
            padding: var(--space-sm);
        }

        .custom-chars-grid {

            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-xs);
        }

        .custom-char-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 20px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all var(--transition-fast);
            overflow: hidden;
            position: relative;
        }

        .custom-char-delete {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(200, 74, 50, 0.9);
            color: white;
            border: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .custom-char-item:hover {
            border-color: var(--color-azurite);
            background: #fff;
        }

        .custom-char-item:hover .custom-char-delete {
            opacity: 1;
        }

        .custom-char-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

    <script src="js/common.js"></script>
    <script>
        // ===== 编辑页状态 =====
        let mainCanvas, annotationCanvas, interactionCanvas;
        let mainCtx, annotationCtx, interactionCtx;
        let selectedAnnotation = null;
        let currentTool = 'select';
        let currentColor = '#C84A32';
        let currentMarkType = 'box';
        let currentAttrType = '字';  // 属性类型：字/词/句子
        let defaultNewBoxAttr = '字';
        let defaultLassoAction = '词';
        let zoom = 1;
        let isDrawing = false;
        let startX, startY;
        let currentRect = null;
        let slashStartX, slashStartY;  // 斜线绘制起点
        let undoStack = [];
        let redoStack = [];

        // ===== 初始化 =====
        function init() {
            mainCanvas = document.getElementById('mainCanvas');
            annotationCanvas = document.getElementById('annotationLayer');
            interactionCanvas = document.getElementById('interactionLayer');

            if (mainCanvas && annotationCanvas && interactionCanvas) {
                mainCtx = mainCanvas.getContext('2d');
                annotationCtx = annotationCanvas.getContext('2d');
                interactionCtx = interactionCanvas.getContext('2d');

                setupEventListeners();
                updateUI();
            }
        }

        // ===== 事件监听 =====
        function setupEventListeners() {
            interactionCanvas.addEventListener('mousedown', handleCanvasMouseDown);
            interactionCanvas.addEventListener('mousemove', handleCanvasMouseMove);
            interactionCanvas.addEventListener('mouseup', handleCanvasMouseUp);
            interactionCanvas.addEventListener('mouseleave', handleCanvasMouseUp);

            document.getElementById('canvasContainer').addEventListener('wheel', handleWheelZoom);
        }

        // ===== 工具选择 =====
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn[id$="Tool"]').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tool + 'Tool')?.classList.add('active');
            interactionCanvas.style.cursor = tool === 'select' ? 'default' : 'crosshair';
            syncAttrTypeSelector();
        }

        function syncAttrTypeSelector() {
            const attrTypeContainer = document.getElementById('attrTypeContainer');
            const boxSelector = document.getElementById('boxAttrTypeSelector');
            const lassoSelector = document.getElementById('lassoAttrTypeSelector');
            const colorMap = {
                '字': '#C84A32',
                '词': '#2B5F8E',
                '句子': '#5B8C5A',
                '删除': '#7A7A7A'
            };

            if (!attrTypeContainer || !boxSelector || !lassoSelector) return;

            if (currentTool === 'box') {
                attrTypeContainer.style.display = 'block';
                boxSelector.style.display = 'flex';
                lassoSelector.style.display = 'none';
                currentColor = colorMap[defaultNewBoxAttr] || currentColor;
                boxSelector.querySelectorAll('.attr-type-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.type === defaultNewBoxAttr);
                });
                return;
            }

            if (currentTool === 'lasso') {
                attrTypeContainer.style.display = 'block';
                boxSelector.style.display = 'none';
                lassoSelector.style.display = 'flex';
                currentColor = colorMap[defaultLassoAction] || currentColor;
                lassoSelector.querySelectorAll('.attr-type-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.type === defaultLassoAction);
                });
                return;
            }

            if (selectedAnnotation && selectedAnnotation.type === 'box') {
                attrTypeContainer.style.display = 'block';
                boxSelector.style.display = 'flex';
                lassoSelector.style.display = 'none';
                boxSelector.querySelectorAll('.attr-type-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.type === selectedAnnotation.attrType);
                });
                return;
            }

            attrTypeContainer.style.display = 'none';
        }

        // ===== 属性类型选择 =====
        function selectAttrType(btn) {
            document.querySelectorAll('.attr-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const selectedType = btn.dataset.type;

            // 根据属性类型自动设置颜色
            const colorMap = {
                '字': '#C84A32',    // --mark-red
                '词': '#2B5F8E',    // --mark-blue
                '句子': '#5B8C5A',  // --mark-green
                '删除': '#7A7A7A'
            };
            const newColor = colorMap[selectedType];

            if (currentTool === 'box') {
                defaultNewBoxAttr = selectedType;
                currentColor = newColor;
            } else if (currentTool === 'lasso') {
                defaultLassoAction = selectedType;
                currentColor = newColor;
            } else {
                currentAttrType = selectedType;
                currentColor = newColor;
                if (selectedAnnotation && selectedAnnotation.type === 'box') {
                    selectedAnnotation.color = currentColor;
                    selectedAnnotation.attrType = currentAttrType;
                    redrawAnnotations();
                    updateAnnotationList();
                    markAsModified();
                }
            }
        }
        // ===== 颜色选择 =====
        function selectColor(el) {
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');
            currentColor = el.dataset.color;

            // 取消属性类型按钮的激活状态（因为用户手动选择了颜色）
            if (currentMarkType === 'box') {
                document.querySelectorAll('.attr-type-btn').forEach(b => b.classList.remove('active'));
            }

            if (selectedAnnotation) {
                selectedAnnotation.color = currentColor;
                redrawAnnotations();
                updateAnnotationList();
                markAsModified();
            }
        }

        // ===== 标注类型选择 =====
        function selectMarkType(btn) {
            document.querySelectorAll('.mark-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMarkType = btn.dataset.type;

            // 显示/隐藏属性类型选择器
            const attrTypeContainer = document.getElementById('attrTypeContainer');
            if (currentMarkType === 'box') {
                attrTypeContainer.style.display = 'block';
            } else {
                attrTypeContainer.style.display = 'none';
            }

            if (selectedAnnotation) {
                selectedAnnotation.type = currentMarkType;
                redrawAnnotations();
                updateAnnotationList();
                markAsModified();
            }
        }

        // ===== 画布操作 =====
        function handleCanvasMouseDown(e) {
            if (!AppState.pages.length) return;

            const rect = interactionCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;

            if (currentTool === 'select') {
                const clicked = findAnnotationAt(x, y);
                if (clicked) {
                    selectAnnotation(clicked);
                } else {
                    deselectAnnotation();
                }
            } else if (currentTool === 'slash') {
                // 斜线绘制
                isDrawing = true;
                slashStartX = x;
                slashStartY = y;
            } else {
                isDrawing = true;
                startX = x;
                startY = y;
                currentRect = { x, y, width: 0, height: 0 };
            }
        }

        function handleCanvasMouseMove(e) {
            if (!isDrawing) return;

            const rect = interactionCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;

            if (currentTool === 'slash') {
                // 绘制斜线预览
                clearInteractionCanvas();
                interactionCtx.strokeStyle = '#E0E0E0';
                interactionCtx.lineWidth = 1;
                interactionCtx.setLineDash([5, 5]);
                interactionCtx.beginPath();
                interactionCtx.moveTo(slashStartX, slashStartY);
                interactionCtx.lineTo(x, y);
                interactionCtx.stroke();
                interactionCtx.setLineDash([]);
            } else {
                currentRect.width = x - startX;
                currentRect.height = y - startY;
                drawCurrentRect();
            }
        }

        function handleCanvasMouseUp(e) {
            if (!isDrawing) return;
            isDrawing = false;

            const rect = interactionCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;

            if (currentTool === 'slash') {
                // 创建斜线标注
                const distance = Math.sqrt(Math.pow(x - slashStartX, 2) + Math.pow(y - slashStartY, 2));
                if (distance > 10) {
                    createSlashAnnotation(slashStartX, slashStartY, x, y);
                }
            } else if (currentRect && Math.abs(currentRect.width) > 5 && Math.abs(currentRect.height) > 5) {
                const normalizedRect = {
                    x: currentRect.width > 0 ? currentRect.x : currentRect.x + currentRect.width,
                    y: currentRect.height > 0 ? currentRect.y : currentRect.y + currentRect.height,
                    width: Math.abs(currentRect.width),
                    height: Math.abs(currentRect.height)
                };

                if (currentTool === 'lasso') {
                    applyLassoAction(normalizedRect);
                } else {
                    createAnnotation(normalizedRect);
                }
            }

            clearInteractionCanvas();
            currentRect = null;
        }

        function drawCurrentRect() {
            clearInteractionCanvas();
            if (!currentRect) return;

            interactionCtx.strokeStyle = currentColor;
            interactionCtx.lineWidth = 2;
            interactionCtx.setLineDash([5, 5]);
            interactionCtx.strokeRect(currentRect.x, currentRect.y, currentRect.width, currentRect.height);
            interactionCtx.setLineDash([]);
        }

        function clearInteractionCanvas() {
            interactionCtx.clearRect(0, 0, interactionCanvas.width, interactionCanvas.height);
        }

        // ===== 标注操作 =====
        function ensureAnnotationRelations(ann) {
            if (ann.parentId === undefined) ann.parentId = null;
            if (!Array.isArray(ann.childIds)) ann.childIds = [];
            return ann;
        }

        function isAnnotationHiddenByMerge(ann) {
            if (!ann || !ann.parentId) return false;
            return selectedAnnotation?.id !== ann.id;
        }

        function cleanupRelationsBeforeDelete(idsToDelete) {
            const idSet = new Set(idsToDelete);
            const idMap = new Map(AppState.annotations.map(a => [a.id, ensureAnnotationRelations(a)]));

            idsToDelete.forEach(id => {
                const ann = idMap.get(id);
                if (!ann) return;

                if (ann.parentId && !idSet.has(ann.parentId)) {
                    const parent = idMap.get(ann.parentId);
                    if (parent) {
                        parent.childIds = parent.childIds.filter(childId => childId !== ann.id);
                    }
                }

                ann.childIds.forEach(childId => {
                    if (idSet.has(childId)) return;
                    const child = idMap.get(childId);
                    if (child && child.parentId === ann.id) {
                        child.parentId = null;
                    }
                });
            });
        }

        function isRectFullyInside(inner, outer) {
            return inner.x >= outer.x &&
                inner.y >= outer.y &&
                inner.x + inner.width <= outer.x + outer.width &&
                inner.y + inner.height <= outer.y + outer.height;
        }

        function getContainedAnnotationsByMode(rect, mode) {
            const pageId = AppState.pages[AppState.currentPageIndex]?.id;
            return AppState.annotations.filter(ann => {
                ensureAnnotationRelations(ann);
                if (ann.pageId !== pageId || ann.type !== 'box' || !ann.rect) return false;
                if (ann.parentId) return false;
                if (!isRectFullyInside(ann.rect, rect)) return false;

                if (mode === '词') return ann.attrType === '字';
                if (mode === '句子') return ann.attrType === '字' || ann.attrType === '词';
                if (mode === '删除') return ann.attrType === '字' || ann.attrType === '词' || ann.attrType === '句子';
                return false;
            });
        }

        function sortByVerticalReadingOrder(list) {
            const columnTolerance = 20;
            return [...list].sort((a, b) => {
                const centerAX = a.rect.x + a.rect.width / 2;
                const centerBX = b.rect.x + b.rect.width / 2;
                const dx = centerBX - centerAX;
                if (Math.abs(dx) <= columnTolerance) {
                    const centerAY = a.rect.y + a.rect.height / 2;
                    const centerBY = b.rect.y + b.rect.height / 2;
                    return centerAY - centerBY;
                }
                return dx;
            });
        }

        function buildMergedText(list) {
            return list
                .map(ann => (ann.simplifiedChar || '').trim())
                .filter(Boolean)
                .join('');
        }

        function getBoundingRect(list) {
            const xs = list.map(ann => ann.rect.x);
            const ys = list.map(ann => ann.rect.y);
            const x2s = list.map(ann => ann.rect.x + ann.rect.width);
            const y2s = list.map(ann => ann.rect.y + ann.rect.height);

            const minX = Math.min(...xs);
            const minY = Math.min(...ys);
            const maxX = Math.max(...x2s);
            const maxY = Math.max(...y2s);

            return {
                x: minX,
                y: minY,
                width: maxX - minX,
                height: maxY - minY
            };
        }

        function applyLassoAction(rect) {
            const mode = defaultLassoAction;
            const targets = getContainedAnnotationsByMode(rect, mode);
            if (!targets.length) return;
            if (mode !== '删除' && targets.length < 2) return;

            if (mode === '删除') {
                saveUndoState();
                const targetIds = targets.map(item => item.id);
                cleanupRelationsBeforeDelete(targetIds);
                const targetSet = new Set(targetIds);
                AppState.annotations = AppState.annotations.filter(ann => !targetSet.has(ann.id));
                if (selectedAnnotation && targetSet.has(selectedAnnotation.id)) {
                    selectedAnnotation = null;
                }
            } else {
                const ordered = sortByVerticalReadingOrder(targets);
                const mergedText = buildMergedText(ordered);
                if (!mergedText) {
                    setStatus('所选标注未填写简体字，无法拼接');
                    return;
                }
                saveUndoState();
                const mergedRect = getBoundingRect(ordered);
                const colorMap = { '词': '#2B5F8E', '句子': '#5B8C5A' };

                const annotation = {
                    id: 'ann_' + Date.now(),
                    pageId: AppState.pages[AppState.currentPageIndex]?.id,
                    type: 'box',
                    rect: mergedRect,
                    color: colorMap[mode],
                    simplifiedChar: mergedText,
                    note: '',
                    attrType: mode,
                    parentId: null,
                    childIds: ordered.map(item => item.id)
                };
                AppState.annotations.push(annotation);
                ordered.forEach(item => {
                    ensureAnnotationRelations(item);
                    item.parentId = annotation.id;
                });
                selectedAnnotation = annotation;
            }

            redrawAnnotations();
            updateAnnotationList();
            updatePropertyPanel();
            updateStatusBar();
            markAsModified();
        }

        function createAnnotation(rect) {
            saveUndoState();

            const annotation = {
                id: 'ann_' + Date.now(),
                pageId: AppState.pages[AppState.currentPageIndex]?.id,
                type: currentMarkType,
                rect: rect,
                color: currentColor,
                simplifiedChar: '',
                note: '',
                attrType: currentMarkType === 'box' ? defaultNewBoxAttr : null,
                parentId: null,
                childIds: []
            };

            AppState.annotations.push(annotation);
            selectedAnnotation = annotation;

            redrawAnnotations();
            updateAnnotationList();
            updatePropertyPanel();
            updateStatusBar();
            markAsModified();
        }

        function createSlashAnnotation(x1, y1, x2, y2) {
            saveUndoState();

            const annotation = {
                id: 'ann_' + Date.now(),
                pageId: AppState.pages[AppState.currentPageIndex]?.id,
                type: 'slash',
                x1: x1,
                y1: y1,
                x2: x2,
                y2: y2,
                color: '#E0E0E0',
                simplifiedChar: '',
                note: '',
                parentId: null,
                childIds: []
            };

            AppState.annotations.push(annotation);
            selectedAnnotation = annotation;

            redrawAnnotations();
            updateAnnotationList();
            updateStatusBar();
            markAsModified();
        }

        function selectAnnotation(annotation) {
            selectedAnnotation = annotation;
            redrawAnnotations();
            updateAnnotationList();
            updatePropertyPanel();
        }

        function deselectAnnotation() {
            selectedAnnotation = null;
            redrawAnnotations();
            updateAnnotationList();
            clearPropertyPanel();
        }

        function deleteAnnotation(id) {
            saveUndoState();
            cleanupRelationsBeforeDelete([id]);
            AppState.annotations = AppState.annotations.filter(a => a.id !== id);
            if (selectedAnnotation?.id === id) {
                selectedAnnotation = null;
            }
            redrawAnnotations();
            updateAnnotationList();
            updateStatusBar();
            markAsModified();
        }

        function findAnnotationAt(x, y) {
            for (let i = AppState.annotations.length - 1; i >= 0; i--) {
                const ann = AppState.annotations[i];
                ensureAnnotationRelations(ann);
                if (ann.pageId !== AppState.pages[AppState.currentPageIndex]?.id) continue;
                if (isAnnotationHiddenByMerge(ann)) continue;

                if (ann.type === 'slash') {
                    // 斜线检测（简化为矩形检测）
                    const minX = Math.min(ann.x1, ann.x2);
                    const maxX = Math.max(ann.x1, ann.x2);
                    const minY = Math.min(ann.y1, ann.y2);
                    const maxY = Math.max(ann.y1, ann.y2);
                    const padding = 5;
                    if (x >= minX - padding && x <= maxX + padding && y >= minY - padding && y <= maxY + padding) {
                        return ann;
                    }
                } else if (ann.rect) {
                    if (x >= ann.rect.x && x <= ann.rect.x + ann.rect.width &&
                        y >= ann.rect.y && y <= ann.rect.y + ann.rect.height) {
                        return ann;
                    }
                }
            }
            return null;
        }

        function redrawAnnotations() {
            annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);

            AppState.annotations.forEach(ann => {
                ensureAnnotationRelations(ann);
                if (ann.pageId !== AppState.pages[AppState.currentPageIndex]?.id) return;
                if (isAnnotationHiddenByMerge(ann)) return;

                const isSelected = selectedAnnotation?.id === ann.id;
                annotationCtx.strokeStyle = ann.color;
                annotationCtx.fillStyle = ann.color;

                switch (ann.type) {
                    case 'box':
                        annotationCtx.lineWidth = isSelected ? 3 : 2;
                        annotationCtx.strokeRect(ann.rect.x, ann.rect.y, ann.rect.width, ann.rect.height);
                        break;
                    case 'underline':
                        annotationCtx.lineWidth = isSelected ? 4 : 3;
                        annotationCtx.beginPath();
                        annotationCtx.moveTo(ann.rect.x, ann.rect.y + ann.rect.height);
                        annotationCtx.lineTo(ann.rect.x + ann.rect.width, ann.rect.y + ann.rect.height);
                        annotationCtx.stroke();
                        break;
                    case 'highlight':
                        annotationCtx.globalAlpha = 0.3;
                        annotationCtx.fillRect(ann.rect.x, ann.rect.y, ann.rect.width, ann.rect.height);
                        annotationCtx.globalAlpha = 1;
                        break;
                    case 'strikethrough':
                        annotationCtx.lineWidth = isSelected ? 4 : 3;
                        annotationCtx.beginPath();
                        annotationCtx.moveTo(ann.rect.x, ann.rect.y + ann.rect.height / 2);
                        annotationCtx.lineTo(ann.rect.x + ann.rect.width, ann.rect.y + ann.rect.height / 2);
                        annotationCtx.stroke();
                        break;
                    case 'slash':
                        annotationCtx.lineWidth = isSelected ? 2 : 1;
                        annotationCtx.beginPath();
                        annotationCtx.moveTo(ann.x1, ann.y1);
                        annotationCtx.lineTo(ann.x2, ann.y2);
                        annotationCtx.stroke();
                        break;
                }
            });
        }

        // ===== 属性面板 =====
        function updatePropertyPanel() {
            if (!selectedAnnotation) {
                clearPropertyPanel();
                return;
            }

            document.getElementById('simplifiedCharInput').value = selectedAnnotation.simplifiedChar || '';
            document.getElementById('annotationNoteInput').value = selectedAnnotation.note || '';

            document.querySelectorAll('.color-swatch').forEach(s => {
                s.classList.remove('selected');
                if (s.dataset.color === selectedAnnotation.color) {
                    s.classList.add('selected');
                }
            });

            document.querySelectorAll('.mark-type-btn').forEach(b => {
                b.classList.remove('active');
                if (b.dataset.type === selectedAnnotation.type) {
                    b.classList.add('active');
                }
            });

            // 更新属性类型选择器
            syncAttrTypeSelector();
        }

        function clearPropertyPanel() {
            document.getElementById('simplifiedCharInput').value = '';
            document.getElementById('annotationNoteInput').value = '';
            syncAttrTypeSelector();
        }

        function updateAnnotationSimplified(value) {
            if (selectedAnnotation) {
                selectedAnnotation.simplifiedChar = value;
                updateAnnotationList();
                markAsModified();
            }
        }

        function updateAnnotationNote(value) {
            if (selectedAnnotation) {
                selectedAnnotation.note = value;
                markAsModified();
            }
        }

        // ===== 标注列表 =====
        function updateAnnotationList() {
            const container = document.getElementById('annotationList');
            const pageAnnotations = AppState.annotations.filter(a =>
                a.pageId === AppState.pages[AppState.currentPageIndex]?.id
            );

            document.getElementById('annotationCount').textContent = pageAnnotations.length + '条';

            if (pageAnnotations.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 16px; color: var(--color-text-light); font-size: 12px;">暂无标注</div>';
                return;
            }

            container.innerHTML = pageAnnotations.map(ann => {
                const typeName = ann.type === 'slash' ? '斜线' : getMarkTypeName(ann.type);
                const attrInfo = ann.attrType ? ` <span style="color:${ann.color};">(${ann.attrType})</span>` : '';
                let displayChar;
                if (ann.attrType === '句子') {
                    displayChar = '句';
                }
                else if (ann.attrType === '词') {
                    displayChar = '词';
                }
                else {
                    displayChar = ann.simplifiedChar || (ann.type === 'slash' ? '/' : '?');
                }
                return `
                    <div class="annotation-card ${selectedAnnotation?.id === ann.id ? 'selected' : ''}" onclick="selectAnnotationById('${ann.id}')">
                        <div class="annotation-preview">
                            <div class="annotation-char" style="border-left: 3px solid ${ann.color};">${displayChar}</div>
                            <div class="annotation-info">
                                <div class="annotation-simplified">${ann.simplifiedChar || '（未填）'}${attrInfo}</div>
                                <div class="annotation-type">${typeName}</div>
                            </div>
                        </div>
                        <div class="annotation-actions">
                            <button class="annotation-action-btn" onclick="event.stopPropagation(); selectAnnotationById('${ann.id}')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="annotation-action-btn delete" onclick="event.stopPropagation(); deleteAnnotation('${ann.id}')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectAnnotationById(id) {
            const ann = AppState.annotations.find(a => a.id === id);
            if (ann) selectAnnotation(ann);
        }

        // ===== 页面管理 =====
        function handleImageImport(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            if (!AppState.project) {
                openModal('projectModal');
            }

            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        addPage({
                            id: 'page_' + Date.now() + '_' + index,
                            pageNo: AppState.pages.length + 1,
                            imageSrc: e.target.result,
                            width: img.width,
                            height: img.height
                        });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });

            event.target.value = '';
        }

        function addPage(page) {
            AppState.pages.push(page);
            AppState.save();
            updateThumbnailList();

            if (AppState.pages.length === 1) {
                loadPage(0);
            }

            updatePageNavButtons();
            updateStatusBar();
            markAsModified();
        }

        function loadPage(index) {
            if (index < 0 || index >= AppState.pages.length) return;

            AppState.currentPageIndex = index;
            const page = AppState.pages[index];

            mainCanvas.width = page.width;
            mainCanvas.height = page.height;
            annotationCanvas.width = page.width;
            annotationCanvas.height = page.height;
            interactionCanvas.width = page.width;
            interactionCanvas.height = page.height;

            const img = new Image();
            img.onload = () => {
                mainCtx.drawImage(img, 0, 0);
                hideEmptyState();
                redrawAnnotations();
                updateAnnotationList();
            };
            img.src = page.imageSrc;

            updatePageIndicator();
            updateThumbnailList();
            updatePageNavButtons();
            updateStatusBar();
        }

        function updateThumbnailList() {
            const container = document.getElementById('thumbnailList');

            if (AppState.pages.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 16px; color: var(--color-text-light); font-size: 11px;">暂无页面</div>';
                return;
            }

            container.innerHTML = AppState.pages.map((page, index) => `
                <div class="thumbnail-item ${index === AppState.currentPageIndex ? 'active' : ''}" onclick="loadPage(${index})">
                    <img src="${page.imageSrc}" alt="Page ${index + 1}">
                    <span class="thumbnail-page">${index + 1}</span>
                    <button class="thumbnail-delete" onclick="event.stopPropagation(); deletePage(${index})">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            `).join('');
        }

        function deletePage(index) {
            if (AppState.pages.length <= 1) {
                AppState.pages = [];
                AppState.annotations = [];
                AppState.currentPageIndex = 0;
                AppState.save();
                showEmptyState();
                clearCanvases();
            } else {
                const pageId = AppState.pages[index].id;
                AppState.annotations = AppState.annotations.filter(a => a.pageId !== pageId);
                AppState.pages.splice(index, 1);
                AppState.pages.forEach((p, i) => p.pageNo = i + 1);

                if (AppState.currentPageIndex >= AppState.pages.length) {
                    AppState.currentPageIndex = AppState.pages.length - 1;
                }
                AppState.save();
                loadPage(AppState.currentPageIndex);
            }

            updateThumbnailList();
            updatePageNavButtons();
            updateStatusBar();
            markAsModified();
        }

        function goToFirstPage() { loadPage(0); }
        function goToPrevPage() { loadPage(AppState.currentPageIndex - 1); }
        function goToNextPage() { loadPage(AppState.currentPageIndex + 1); }
        function goToLastPage() { loadPage(AppState.pages.length - 1); }

        function updatePageNavButtons() {
            const btns = document.querySelectorAll('.page-nav-btn');
            if (btns.length >= 4) {
                btns[0].disabled = AppState.currentPageIndex <= 0;
                btns[1].disabled = AppState.currentPageIndex <= 0;
                btns[2].disabled = AppState.currentPageIndex >= AppState.pages.length - 1;
                btns[3].disabled = AppState.currentPageIndex >= AppState.pages.length - 1;
            }
        }

        function updatePageIndicator() {
            document.getElementById('pageIndicator').textContent =
                `${AppState.currentPageIndex + 1} / ${Math.max(1, AppState.pages.length)}`;
        }

        // ===== 缩放 =====
        function zoomIn() {
            zoom = Math.min(4, zoom + 0.25);
            applyZoom();
        }

        function zoomOut() {
            zoom = Math.max(0.25, zoom - 0.25);
            applyZoom();
        }

        function applyZoom() {
            const wrapper = document.getElementById('canvasWrapper');
            wrapper.style.transform = `scale(${zoom})`;
            document.getElementById('zoomValue').textContent = Math.round(zoom * 100) + '%';
            document.getElementById('statusZoom').textContent = Math.round(zoom * 100) + '%';
        }

        function handleWheelZoom(e) {
            if (e.ctrlKey) {
                e.preventDefault();
                if (e.deltaY < 0) zoomIn();
                else zoomOut();
            }
        }

        // ===== 项目管理 =====

        function createNewProject() {
            openModal('projectModal');
        }

        function isProjectInfoComplete() {
            return AppState.project &&
                AppState.project.title &&
                AppState.project.author &&
                AppState.project.dynasty &&
                AppState.project.book &&
                AppState.project.volume;
        }

        function confirmNewProject() {
            const title = document.getElementById('projectTitle').value.trim();
            if (!title) {
                alert('请输入古籍标题');
                return;
            }

            AppState.project = {
                id: 'proj_' + Date.now(),
                title: title,
                author: document.getElementById('projectAuthor').value,
                dynasty: document.getElementById('projectDynasty').value,
                book: document.getElementById('projectBook').value,
                volume: document.getElementById('projectVolume').value
            };

            AppState.save();
            closeModal('projectModal');
            setStatus('项目已创建');
        }

        function handleProjectOpen(event) {
            const file = event.target.files[0];
            if (!file) return;

            ProjectManager.import(file).then(() => {
                updateUI();
                if (AppState.pages.length > 0) {
                    loadPage(0);
                }
            }).catch(err => {
                alert(err.message);
            });

            event.target.value = '';
        }

        function saveProject() {
            // 1. 检查 AppState 数据是否完整
            if (!isProjectInfoComplete()) {
                alert('请先完善并确认项目基本信息（标题、作者、朝代等）');
                createNewProject(); // 自动打开弹窗
                return; // 中止程序，不执行后面的 AppState.save()
            }

            // 2. 若信息完整，执行原有程序
            AppState.save();
            ProjectManager.export();
            setStatus('项目已保存', 'saved');
        }

        function handleExportXML() {
            //检查信息是否已经填写完整
            if (isProjectInfoComplete()) {
                // 如果信息已输入，按原计划跳转到导出页面
                window.location.href = 'exportXml.html';
            } else {
                // 如果信息不完整，提示并自动打开“新建”弹窗
                alert('请先完善项目基本信息（标题、作者、朝代等）');
                createNewProject();
            }
        }


        // ===== 撤销/重做 =====
        function saveUndoState() {
            undoStack.push(JSON.stringify(AppState.annotations));
            redoStack = [];
        }

        function undoAction() {
            if (undoStack.length === 0) return;
            redoStack.push(JSON.stringify(AppState.annotations));
            AppState.annotations = JSON.parse(undoStack.pop());
            selectedAnnotation = null;
            redrawAnnotations();
            updateAnnotationList();
            markAsModified();
        }

        function redoAction() {
            if (redoStack.length === 0) return;
            undoStack.push(JSON.stringify(AppState.annotations));
            AppState.annotations = JSON.parse(redoStack.pop());
            selectedAnnotation = null;
            redrawAnnotations();
            updateAnnotationList();
            markAsModified();
        }

            updateThumbnailList();
            updatePageNavButtons();
            updatePageIndicator();
            updateAnnotationList();
            updateCustomCharsGrid();
            updateStatusBar();

            if (AppState.pages.length > 0) {
                loadPage(AppState.currentPageIndex);

                showEmptyState();

            document.getElementById('statusPage').textContent =
                AppState.pages.length > 0 ? `${AppState.currentPageIndex + 1}/${AppState.pages.length}` : '-';
            document.getElementById('statusAnnotations').textContent = AppState.annotations.length;

            const container = document.getElementById('customCharsGrid');

        function deleteCustomChar(charId) {
            // 从全局状态中移除指定造字

            AppState.save();                // 保存到 localStorage

        function useCustomChar(charId) {
            const char = AppState.customChars.find(c => c.id === charId);
            if (char && selectedAnnotation) {
                selectedAnnotation.simplifiedChar = char.name;
                updatePropertyPanel();
                updateAnnotationList();
                markAsModified();
            }
        }

        function markAsModified() {
            AppState.save();
            document.getElementById('statusDot').classList.add('modified');
            document.getElementById('statusText').textContent = '已修改';
        }

        function setStatus(text, type) {
            document.getElementById('statusText').textContent = text;
            if (type === 'saved') {
                document.getElementById('statusDot').classList.remove('modified');
            }
        }

        function showEmptyState() {
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('canvasWrapper').style.display = 'none';
        }

        function hideEmptyState() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('canvasWrapper').style.display = 'block';
        }

        function clearCanvases() {
            if (mainCtx) mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            if (annotationCtx) annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
            if (interactionCtx) interactionCtx.clearRect(0, 0, interactionCanvas.width, interactionCanvas.height);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);

        <!--附加内容-->
        function checkProjectInfoComplete() {
            if (!AppState.project ||
                !AppState.project.title ||
                !AppState.project.author ||
                !AppState.project.dynasty) {
                return false;
            }
            return true;
        }
    </script>
