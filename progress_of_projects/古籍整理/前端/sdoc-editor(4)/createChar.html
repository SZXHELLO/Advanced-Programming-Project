<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>造字 | SDOC Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .char-creation-page {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--space-md);
            overflow: hidden;
        }

        .page-header {
            margin-bottom: var(--space-md);
            flex-shrink: 0;
        }

        .page-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--color-ink);
            margin-bottom: var(--space-xs);
        }

        .page-desc {
            color: var(--color-text-light);
            font-size: 13px;
        }

        .creation-area {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: var(--space-md);
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .canvas-section {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-ink);
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            flex-shrink: 0;
        }

        .section-title svg {
            width: 18px;
            height: 18px;
            color: var(--color-cinnabar);
        }

        .char-canvas-container {
            flex: 1;
            display: flex;
            /* align-items: center;
            justify-content: center; */
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: #fff;
            min-height: 0;
        }

        #charCanvas {
            cursor: crosshair;
            width: 100%;
            height: 100%;
        }

        .canvas-tools {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm);
            background: var(--color-paper);
            border-radius: var(--radius-sm);
            margin-top: var(--space-sm);
            flex-shrink: 0;
        }

        .char-tool-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--color-text);
            transition: all var(--transition-fast);
        }

        .char-tool-btn:hover {
            border-color: var(--color-azurite);
        }

        .char-tool-btn.active {
            background: var(--color-azurite);
            color: white;
            border-color: var(--color-azurite);
        }

        .char-tool-btn svg {
            width: 18px;
            height: 18px;
        }

        .brush-size-control {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .brush-size-control label {
            font-size: 12px;
            color: var(--color-text-light);
        }

        .brush-size-control input[type="range"] {
            width: 80px;
        }

        /* 右侧面板 */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            overflow: hidden;
        }

        .info-card {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
        }

        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .char-preview-large {
            width: 120px;
            height: 120px;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-family: 'Noto Serif SC', serif;
            margin-bottom: var(--space-sm);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .unicode-badge {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            padding: var(--space-xs) var(--space-sm);
            background: var(--color-paper);
            border-radius: var(--radius-sm);
            color: var(--color-azurite);
        }

        /* 字库列表 */
        .char-library {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .char-library-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-xs);
        }

        .library-char-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 20px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all var(--transition-fast);
            overflow: hidden;
        }

        .library-char-item:hover {
            border-color: var(--color-azurite);
            background: #fff;
        }

        .library-char-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-sm);
            flex-shrink: 0;
        }

        .nav-buttons .btn {
            flex: 1;
            padding: var(--space-sm);
        }

        /* 操作提示 */
        .tips-section {
            background: #FFF9E6;
            border: 1px solid #F0E0B0;
            border-radius: var(--radius-md);
            padding: var(--space-sm);
            margin-bottom: var(--space-sm);
            flex-shrink: 0;
        }

        .tips-title {
            font-size: 12px;
            font-weight: 600;
            color: #8B6914;
            margin-bottom: var(--space-xs);
        }

        .tips-list {
            font-size: 11px;
            color: #6B5914;
            padding-left: var(--space-md);
            margin: 0;
        }

        .tips-list li {
            margin-bottom: 2px;
        }
    </style>
</head>

    <script>
        let charCanvas, charCtx;
        let isDrawingChar = false;
        let charTool = 'brush';
        let brushSize = 8;

        function resizeCanvas() {
            const container = document.querySelector('.char-canvas-container');
            const rect = container.getBoundingClientRect();

            // 关键：让画布实际分辨率 = 容器显示大小
            charCanvas.width = rect.width;
            charCanvas.height = rect.height;

            // 重新初始化画布样式（防止重置后丢失）
            charCtx.fillStyle = '#fff';
            charCtx.fillRect(0, 0, charCanvas.width, charCanvas.height);
            charCtx.strokeStyle = '#000';
            charCtx.lineWidth = brushSize;
            charCtx.lineCap = 'round';
            charCtx.lineJoin = 'round';
        }

        // 辅助函数：判断画布是否为空白（全白色背景）
        function isCanvasBlank(canvas) {
            const ctx = canvas.getContext('2d');
            // 获取画布所有像素数据
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            // 遍历像素，检查是否存在非白色像素（白色RGBA: 255,255,255,255）
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const a = data[i + 3];
                if (r !== 255 || g !== 255 || b !== 255 || a !== 255) {
                    return false; // 存在非白色像素 → 画布有内容
                }
            }
            return true; // 全是白色 → 画布空白
        }

        function init() {
            charCanvas = document.getElementById('charCanvas');
            charCtx = charCanvas.getContext('2d');

            resizeCanvas();

            charCtx.fillStyle = '#fff';
            charCtx.fillRect(0, 0, charCanvas.width, charCanvas.height);
            charCtx.strokeStyle = '#000';
            charCtx.lineWidth = brushSize;
            charCtx.lineCap = 'round';
            charCtx.lineJoin = 'round';

            charCanvas.addEventListener('mousedown', handleCharCanvasMouseDown);
            charCanvas.addEventListener('mousemove', handleCharCanvasMouseMove);
            charCanvas.addEventListener('mouseup', handleCharCanvasMouseUp);
            charCanvas.addEventListener('mouseleave', handleCharCanvasMouseUp);

            updateCharLibrary();
            updateUnicodeDisplay();
            updateCharPreview();
            window.addEventListener('resize', resizeCanvas);
        }

        function handleCharCanvasMouseDown(e) {
            isDrawingChar = true;
            const rect = charCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            charCtx.beginPath();
            charCtx.moveTo(x, y);
        }

        function handleCharCanvasMouseMove(e) {
            if (!isDrawingChar) return;
            const rect = charCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            charCtx.lineTo(x, y);
            charCtx.stroke();
        }

        function handleCharCanvasMouseUp() {
            isDrawingChar = false;
            updateCharPreview();
        }

        function setCharTool(tool) {
            charTool = tool;
            document.getElementById('brushTool').classList.toggle('active', tool === 'brush');
            document.getElementById('eraserTool').classList.toggle('active', tool === 'eraser');

            if (tool === 'eraser') {
                charCtx.globalCompositeOperation = 'destination-out';
                charCtx.lineWidth = brushSize * 2;
            } else {
                charCtx.globalCompositeOperation = 'source-over';
                charCtx.lineWidth = brushSize;
            }
        }

        function updateBrushSize(value) {
            brushSize = parseInt(value);
            document.getElementById('brushSizeValue').textContent = value;

            if (charTool === 'eraser') {
                charCtx.lineWidth = brushSize * 2;
            } else {
                charCtx.lineWidth = brushSize;
            }
        }

        function clearCharCanvas() {
            charCtx.globalCompositeOperation = 'source-over';
            charCtx.fillStyle = '#fff';
            charCtx.fillRect(0, 0, charCanvas.width, charCanvas.height);
            updateCharPreview();
        }

        function updateCharPreview() {
            // 1. 获取预览容器和主画布
            const previewContainer = document.getElementById('charPreview');
            // 请替换为你实际的主画布选择器（比如 .main-canvas / .char-canvas 等）
            const charCanvas = document.getElementById('charCanvas');

            /* // 调试：确认元素是否获取成功（可在控制台查看）
            console.log('预览容器:', previewContainer);
            console.log('主画布:', charCanvas);
            if (!previewContainer || !charCanvas) return; */

            //  判断画布是否空白
            const isBlank = isCanvasBlank(charCanvas);

            //  空白时：显示「预览」文字 + 清除背景图
            if (isBlank) {
                previewContainer.textContent = '预览';
                previewContainer.style.backgroundImage = 'none';
                return; // 直接结束，不需要绘制预览图
            }


            // 2. 获取预览容器的实际显示尺寸（保证预览图和容器1:1对应）
            const dpr = window.devicePixelRatio || 1;
            const rect = previewContainer.getBoundingClientRect();
            const previewWidth = rect.width;
            const previewHeight = rect.height;

            // 3. 创建临时画布生成清晰预览（避免直接拉伸模糊）
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = previewWidth * dpr;  // 预览图分辨率 = 容器显示尺寸
            tempCanvas.height = previewHeight * dpr;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.scale(dpr, dpr);

            // 4. 清空预览画布（白色背景）
            tempCtx.fillStyle = '#ffffff';
            tempCtx.fillRect(0, 0, previewWidth, previewHeight);

            // 5. 关键：关闭图像平滑，让笔画边缘清晰锐利（解决发虚）
            tempCtx.imageSmoothingEnabled = false;
            // 兼容旧浏览器
            tempCtx.mozImageSmoothingEnabled = false;
            tempCtx.webkitImageSmoothingEnabled = false;
            tempCtx.msImageSmoothingEnabled = false;

            // 6. 等比例缩放主画布到预览框，保持字形比例并居中
            const scale = Math.min(
                previewWidth / charCanvas.width,
                previewHeight / charCanvas.height
            );
            const offsetX = (previewWidth - charCanvas.width * scale) / 2;
            const offsetY = (previewHeight - charCanvas.height * scale) / 2;

            // 7. 绘制主画布内容到预览画布
            tempCtx.drawImage(
                charCanvas,
                0, 0, charCanvas.width, charCanvas.height, // 源：主画布完整内容
                offsetX, offsetY, // 目标：预览框居中位置
                charCanvas.width * scale, charCanvas.height * scale // 目标：等比例缩放后的尺寸
            );

            // 8. 将清晰预览图设置为预览容器背景
            const dataURL = tempCanvas.toDataURL('image/png');
            previewContainer.style.backgroundImage = `url(${dataURL})`;
            previewContainer.style.backgroundSize = 'contain';
            previewContainer.style.backgroundPosition = 'center';
            previewContainer.style.backgroundRepeat = 'no-repeat';

            previewContainer.textContent = '';
        }

        function updateUnicodeDisplay() {
            const code = 0xE000 + AppState.customChars.length;
            document.getElementById('unicodeDisplay').textContent = 'U+' + code.toString(16).toUpperCase().padStart(4, '0');
        }

        function saveCustomChar() {
            const name = document.getElementById('charNameInput').value.trim();
            if (!name) {
                alert('请输入字形名称');
                return;
            }

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 64;
            tempCanvas.height = 64;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(charCanvas, 0, 0, 64, 64);

            const code = 0xE000 + AppState.customChars.length;

            const customChar = {
                id: 'char_' + Date.now(),
                unicode: code,
                name: name,
                imageData: tempCanvas.toDataURL()
            };

            AppState.customChars.push(customChar);
            AppState.save();

            clearCharCanvas();
            document.getElementById('charNameInput').value = '';

            updateCharLibrary();
            updateUnicodeDisplay();

            alert('字形保存成功！可前往编辑页使用该字形。');
        }

        function updateCharLibrary() {
            const container = document.getElementById('charLibraryGrid');
            document.getElementById('charCount').textContent = AppState.customChars.length + ' 个';
            document.getElementById('statusCharCount').textContent = AppState.customChars.length;

            if (AppState.customChars.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 12px; color: var(--color-text-light); font-size: 12px;">暂无造字</div>';
                return;
            }

            container.innerHTML = AppState.customChars.map(char => `
                <div class="library-char-item" title="${char.name}">
                    <img src="${char.imageData}" alt="${char.name}">
                </div>
            `).join('');
        }

        window.onload = init;
        document.addEventListener('DOMContentLoaded', init);
    </script>
